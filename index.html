<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>山洞逃生 Cave Escape</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;font-family:'Courier New',monospace;user-select:none}
canvas{display:block;position:fixed;top:0;left:0}

/* 竖屏旋转提示 */
#rotateHint{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0510;z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#rotateHint .phone{width:50px;height:80px;border:3px solid #ff6b35;border-radius:8px;animation:rotP 2s ease-in-out infinite}
#rotateHint p{color:#ff6b35;font-size:16px}
@keyframes rotP{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}
@media (orientation:portrait) and (max-width:768px){#rotateHint{display:flex!important}}

/* 通用遮罩 */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.overlay.active{display:flex}

/* 标题屏 */
#titleScreen{background:linear-gradient(180deg,#1a0a2e,#0d0520)}
#titleScreen h1{font-size:clamp(28px,5vw,48px);color:#ff6b35;text-shadow:0 0 20px #ff6b35,0 0 40px rgba(255,107,53,.3);margin-bottom:6px;letter-spacing:2px}
#titleScreen .sub{color:#665580;font-size:clamp(11px,2vw,14px);margin-bottom:30px}
.btn{padding:12px 28px;font-size:clamp(13px,2.5vw,18px);background:#ff6b35;color:#fff;border:none;border-radius:8px;cursor:pointer;margin:5px;font-family:inherit;transition:transform .15s,background .15s}
.btn:hover{background:#ff8855}
.btn:active{transform:scale(.93)}
.btn.secondary{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15)}

/* 角色选择 */
#charScreen{background:linear-gradient(180deg,#1a0a2e,#0d0520)}
#charScreen h2{color:#ff6b35;font-size:clamp(18px,4vw,28px);margin-bottom:16px}
.chars{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.char-card{padding:14px 18px;background:rgba(255,255,255,.04);border:2px solid #333;border-radius:10px;cursor:pointer;text-align:center;transition:all .25s;min-width:100px}
.char-card:hover,.char-card.sel{border-color:#ff6b35;background:rgba(255,107,53,.08)}
.char-card .icon{font-size:36px}
.char-card .nm{color:#fff;font-size:14px;margin-top:4px}
.char-card .desc{color:#8877aa;font-size:10px;margin-top:3px}

/* HUD - 横屏布局 */
#hud{position:fixed;top:0;left:0;width:100%;padding:4px 12px;z-index:50;pointer-events:none;display:none}
.hud-row{display:flex;align-items:center;gap:8px}
.hp-bar{width:140px;height:14px;background:#222;border-radius:7px;overflow:hidden;border:1px solid #444}
.hp-fill{height:100%;background:linear-gradient(90deg,#e74c3c,#ff6b6b);border-radius:7px;transition:width .3s}
.hp-text{color:#ccc;font-size:12px}
.weapon-tag{color:#aaa;font-size:11px;margin-left:8px;background:rgba(255,255,255,.05);padding:2px 6px;border-radius:4px}
.level-name{color:#ff6b35;font-size:12px;margin-left:auto}
.status-tags{display:flex;gap:3px;margin-top:2px}
.stag{padding:1px 5px;border-radius:3px;font-size:9px;color:#fff}
.stag.slow{background:#3498db}.stag.poison{background:#27ae60}.stag.confuse{background:#9b59b6}.stag.orb{background:#f1c40f}.stag.adrenaline{background:#e67e22}.stag.armor{background:#95a5a6}.stag.torch{background:#e67e22}

/* 背包 - 横屏底部居中 */
#invBar{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);display:none;gap:4px;z-index:50}
.inv-s{width:42px;height:42px;background:rgba(0,0,0,.75);border:2px solid #444;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;position:relative;cursor:pointer}
.inv-s:active{border-color:#ff6b35}
.inv-s .cnt{position:absolute;bottom:1px;right:2px;font-size:8px;color:#fff}
.inv-s .key{position:absolute;top:1px;left:3px;font-size:7px;color:#888}

/* 手机摇杆 - 横屏左侧 */
#joyArea{position:fixed;bottom:12px;left:16px;width:100px;height:100px;z-index:60;display:none}
#joyBase{width:100px;height:100px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:50%;position:relative}
#joyKnob{width:40px;height:40px;background:rgba(255,255,255,.18);border-radius:50%;position:absolute;top:30px;left:30px}

.mob-btns{position:fixed;bottom:14px;right:16px;display:none;gap:6px;z-index:60}
.mob-btn{width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,.15);background:rgba(0,0,0,.5);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.mob-btn:active{background:rgba(255,107,53,.3);border-color:#ff6b35}

/* 关卡过渡 */
#lvlTrans{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column}
#lvlTrans h2{color:#ff6b35;font-size:clamp(22px,5vw,36px)}
#lvlTrans p{color:#8877aa;font-size:clamp(11px,2.5vw,14px);margin-top:6px}

/* 宝箱弹窗 */
#chestDlg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(15,8,25,.96);border:2px solid #ff6b35;border-radius:12px;padding:18px 24px;z-index:150;display:none;text-align:center;min-width:180px}
#chestDlg h3{color:#ffd700;font-size:18px;margin-bottom:6px}
#chestDlg .item{font-size:22px;margin:6px 0}
#chestDlg .iname{color:#ffd700;font-size:15px}
#chestDlg .idesc{color:#9988bb;font-size:11px;margin-top:3px}

/* 结束屏 */
#endScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column}
#endScreen h2{font-size:clamp(22px,5vw,38px);margin-bottom:10px}
#endScreen p{color:#9988bb;font-size:13px;margin-bottom:16px}
#endScreen .btn{margin-top:6px}

/* Boss 血条 */
#bossBar{position:fixed;top:36px;left:50%;transform:translateX(-50%);display:none;z-index:55;text-align:center}
#bossBar .bname{color:#ff6b35;font-size:12px;margin-bottom:2px}
#bossBar .bhp{width:200px;height:10px;background:#333;border-radius:5px;overflow:hidden}
#bossBar .bhp-fill{height:100%;background:#e74c3c;border-radius:5px;transition:width .2s}

/* 小地图 - 横屏右上 */
#minimap{position:fixed;top:30px;right:6px;z-index:55;border:1px solid #333;border-radius:4px;opacity:.7}
</style>
</head>
<body>

<!-- 竖屏旋转提示 -->
<div id="rotateHint">
  <div class="phone"></div>
  <p>请横屏游玩 🔄</p>
</div>

<!-- 标题屏 -->
<div id="titleScreen" class="overlay active">
  <h1>山洞逃生</h1>
  <div class="sub">张小龙 &amp; 徐凝柔 · 洞穴逃亡</div>
  <button class="btn" onclick="showCharSelect()">开始游戏</button>
  <button class="btn secondary" onclick="showHow()">操作说明</button>
  <div id="howBox" style="display:none;color:#9988bb;font-size:12px;max-width:320px;margin-top:16px;line-height:1.8;text-align:left">
    <b style="color:#ff6b35">PC:</b> WASD移动 | 空格攻击 | E交互/开箱 | F传送 | 1-5使用道具<br>
    <b style="color:#ff6b35">手机:</b> 左摇杆移动 | ⚔攻 💊用 ✦传<br>
    <b style="color:#ff6b35">目标:</b> 探索迷宫→找箱子开道具→打败Boss→传送阵前进→找到出口
  </div>
</div>

<!-- 角色选择 -->
<div id="charScreen" class="overlay">
  <h2>选择角色</h2>
  <div class="chars">
    <div class="char-card sel" onclick="pickChar(0,this)">
      <div class="icon">🧑</div>
      <div class="nm">张小龙</div>
      <div class="desc">HP+20 稍快</div>
    </div>
    <div class="char-card" onclick="pickChar(1,this)">
      <div class="icon">👩</div>
      <div class="nm">徐凝柔</div>
      <div class="desc">视野+1 回复快</div>
    </div>
  </div>
  <button class="btn" onclick="startGame()">出发</button>
</div>

<!-- Canvas -->
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-row">
    <div class="hp-bar"><div class="hp-fill" id="hpFill" style="width:100%"></div></div>
    <span class="hp-text" id="hpText">100/100</span>
    <span class="level-name" id="lvlName"></span>
  </div>
  <div class="status-tags" id="statusTags"></div>
</div>

<!-- 背包 -->
<div id="invBar"></div>

<!-- Boss血条 -->
<div id="bossBar"><div class="bname" id="bossName"></div><div class="bhp"><div class="bhp-fill" id="bossHpFill"></div></div></div>

<!-- 小地图 -->
<canvas id="minimap" width="100" height="100"></canvas>

<!-- 手机控件 -->
<div id="joyArea"><div id="joyBase"><div id="joyKnob"></div></div></div>
<div class="mob-btns" id="mobBtns">
  <div class="mob-btn" ontouchstart="mobAttack()" onmousedown="mobAttack()">⚔</div>
  <div class="mob-btn" ontouchstart="mobUse()" onmousedown="mobUse()">💊</div>
  <div class="mob-btn" ontouchstart="mobTeleport()" onmousedown="mobTeleport()">✦</div>
</div>

<!-- 关卡过渡 -->
<div id="lvlTrans"><h2 id="lvlTransTitle"></h2><p id="lvlTransDesc"></p></div>

<!-- 宝箱弹窗 -->
<div id="chestDlg">
  <h3>🎁 宝箱</h3>
  <div class="item" id="chestIcon"></div>
  <div class="iname" id="chestName"></div>
  <div class="idesc" id="chestDesc"></div>
  <button class="btn" style="margin-top:12px;padding:8px 20px;font-size:14px" onclick="closeChest()">收下</button>
</div>

<!-- 结束屏 -->
<div id="endScreen">
  <h2 id="endTitle"></h2>
  <p id="endDesc"></p>
  <button class="btn" onclick="restartGame()">再来一次</button>
</div>

<script>
// ============ 工具 ============
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const randf=(a,b)=>Math.random()*(b-a)+a;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const lerp=(a,b,t)=>a+(b-a)*t;

// ============ 配置 ============
const T=32; // tile size
const LEVELS=[
  {name:"幽暗石窟",w:50,h:40,rooms:8,bosses:1,time:1800,vis:5.5},
  {name:"腐化地道",w:55,h:45,rooms:10,bosses:2,time:1500,vis:5},
  {name:"熔岩深渊",w:60,h:48,rooms:12,bosses:2,time:1200,vis:4.5},
  {name:"幻觉迷宫",w:65,h:50,rooms:14,bosses:3,time:1000,vis:4},
  {name:"深渊终地",w:70,h:55,rooms:16,bosses:3,time:900,vis:3.5}
];

const ITEMS=[
  {id:'orb',name:'发光宝珠',icon:'🔮',rarity:.07,desc:'视野x3 45秒',type:'buff',dur:2700,eff:'orb'},
  {id:'adrenaline',name:'肾上腺素',icon:'💉',rarity:.08,desc:'移速+80% 20秒',type:'buff',dur:1200,eff:'adrenaline'},
  {id:'armor',name:'盔甲套装',icon:'🛡️',rarity:.06,desc:'减伤50% 磨损100',type:'equip',wear:100},
  {id:'sword',name:'铁剑',icon:'⚔️',rarity:.10,desc:'攻击+20 耐久60',type:'weapon',dur:60,atk:20},
  {id:'crossbow',name:'石弓',icon:'🏹',rarity:.08,desc:'攻击+15 12箭',type:'weapon',dur:12,atk:15,ranged:true},
  {id:'dagger',name:'毒匕首',icon:'🗡️',rarity:.07,desc:'攻击+10+持续毒',type:'weapon',dur:30,atk:10,poison:true},
  {id:'herb',name:'草药包',icon:'🌿',rarity:.12,desc:'回复40HP',type:'consume',heal:40},
  {id:'antidote',name:'解毒药',icon:'💊',rarity:.10,desc:'清除中毒',type:'consume',curePoison:true},
  {id:'clarity',name:'清醒药',icon:'💧',rarity:.08,desc:'清除混乱',type:'consume',cureConfuse:true},
  {id:'map',name:'地图残页',icon:'🗺️',rarity:.06,desc:'揭示30%迷雾',type:'instant',reveal:.3},
  {id:'smoke',name:'烟雾弹',icon:'💨',rarity:.07,desc:'Boss失目标10秒',type:'instant',blind:600},
  {id:'shield',name:'护盾石',icon:'🪨',rarity:.06,desc:'吸收一次伤害',type:'equip',charges:1},
  {id:'torch',name:'火把',icon:'🔥',rarity:.09,desc:'视野+2 60秒',type:'buff',dur:3600,eff:'torch'},
  {id:'rope',name:'钩爪绳索',icon:'🪝',rarity:.06,desc:'越墙5次',type:'equip',charges:5},
  {id:'bandage',name:'绷带',icon:'🩹',rarity:.13,desc:'回复20HP',type:'consume',heal:20},
  {id:'phoenix',name:'不死药',icon:'✨',rarity:.01,desc:'死亡时复活',type:'equip',charges:1}
];

const BOSS_TYPES=[
  {id:'golem',name:'石傀儡',color:'#7f8c8d',size:28,hp:180,atk:12,speed:1.2,skill:'slow',skillDur:480,skillCD:300,desc:'震地波-减速50%',weakness:'sword'},
  {id:'spider',name:'毒雾蛛后',color:'#8e44ad',size:24,hp:140,atk:8,speed:1.8,skill:'poison',skillDur:600,skillCD:360,desc:'毒雾-持续中毒',weakness:'antidote'},
  {id:'lion',name:'幻影狂狮',color:'#e67e22',size:26,hp:200,atk:25,speed:2.5,skill:'rage',skillDur:300,skillCD:240,desc:'狂暴-超高伤害',weakness:'armor'},
  {id:'warlock',name:'混沌蛊师',color:'#9b59b6',size:22,hp:150,atk:10,speed:1.5,skill:'confuse',skillDur:360,skillCD:300,desc:'幻术-操作反向',weakness:'clarity'},
  {id:'abyss',name:'深渊领主',color:'#2c3e50',size:32,hp:300,atk:18,speed:1.0,skill:'multi',skillDur:240,skillCD:180,desc:'三阶段-越低血越强',weakness:'smoke'}
];

// ============ 全局状态 ============
let canvas,ctx,mmCanvas,mmCtx;
let state='title'; // title,charSelect,playing,paused
let curLevel=0;
let map=null;
let explored=null;
let player=null;
let bosses=[];
let chests=[];
let portals=[];
let particles=[];
let projectiles=[];
let camera={x:0,y:0};
let gameTime=0;
let charIdx=0;
let keys={};
let joyDir={x:0,y:0};
let joyActive=false;
let isMobile=false;
let bossRef=null; // current nearby boss for HUD
let chestOpen=null;
let animFrame=0;

// ============ 初始化 ============
window.onload=function(){
  canvas=document.getElementById('gameCanvas');
  ctx=canvas.getContext('2d');
  mmCanvas=document.getElementById('minimap');
  mmCtx=mmCanvas.getContext('2d');
  resize();
  window.addEventListener('resize',resize);
  isMobile='ontouchstart' in window||navigator.maxTouchPoints>0;
  if(isMobile){
    document.getElementById('joyArea').style.display='block';
    document.getElementById('mobBtns').style.display='flex';
    document.getElementById('minimap').style.display='none';
    initJoystick();
  }
  window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase()))e.preventDefault()});
  window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});
  // 锁定横屏（如果支持）
  if(screen.orientation&&screen.orientation.lock){
    screen.orientation.lock('landscape').catch(()=>{});
  }
  requestAnimationFrame(loop);
};

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}

// ============ 界面 ============
function showCharSelect(){
  document.getElementById('titleScreen').classList.remove('active');
  document.getElementById('charScreen').classList.add('active');
  state='charSelect';
}
function showHow(){
  const b=document.getElementById('howBox');
  b.style.display=b.style.display==='none'?'block':'none';
}
function pickChar(i,el){
  charIdx=i;
  document.querySelectorAll('.char-card').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}

function startGame(){
  curLevel=0;
  document.getElementById('charScreen').classList.remove('active');
  document.getElementById('hud').style.display='block';
  document.getElementById('invBar').style.display='flex';
  if(!isMobile) document.getElementById('minimap').style.display='block';
  initLevel();
}

function initLevel(){
  const cfg=LEVELS[curLevel];
  showLevelTrans(cfg.name, `第${curLevel+1}关 · ${cfg.rooms}间房间 · ${cfg.bosses}个Boss`);

  setTimeout(()=>{
    map=generateDungeon(cfg);
    explored=Array(map.h).fill(null).map(()=>Array(map.w).fill(false));

    // 玩家
    const startRoom=map.rooms[0];
    if(!player){
      player={
        name:charIdx===0?'张小龙':'徐凝柔',
        charIdx:charIdx,
        x:startRoom.cx*T+T/2, y:startRoom.cy*T+T/2,
        hp:charIdx===0?120:100, maxHp:charIdx===0?120:100,
        speed:2.8, baseSpeed:2.8,
        atk:10, baseAtk:10,
        weapon:null, armor:null, shield:null, phoenix:null, rope:null,
        inventory:[],
        effects:[], // active buff/debuff
        facing:0, // angle
        attackCD:0, hurtCD:0,
        walkAnim:0, walkTimer:0,
        alive:true,
        baseVis:cfg.vis,
        vis:cfg.vis
      };
    } else {
      player.x=startRoom.cx*T+T/2;
      player.y=startRoom.cy*T+T/2;
    }

    // Bosses
    bosses=[];
    const bossRoomIndices=map.rooms.length>=3?[...Array(map.rooms.length-2).keys()].slice(-cfg.bosses):[map.rooms.length-1];
    for(let i=0;i<cfg.bosses&&i<bossRoomIndices.length;i++){
      const bi=i%BOSS_TYPES.length;
      const bt=BOSS_TYPES[bi];
      const room=map.rooms[bossRoomIndices[i]];
      bosses.push({
        ...bt,
        x:room.cx*T+T/2, y:room.cy*T+T/2,
        curHp:bt.hp, maxHp:bt.hp,
        room:room, alive:true,
        skillTimer:0, skillActive:false, skillDurLeft:0,
        phase:0, blindTimer:0,
        patrol:{x:room.cx*T+T/2,y:room.cy*T+T/2,angle:rand(0,360)*Math.PI/180}
      });
    }

    // 箱子
    chests=[];
    const chestRooms=map.rooms.slice(1,-1).sort(()=>Math.random()-.5);
    const numChests=Math.min(chestRooms.length, cfg.rooms+2);
    for(let i=0;i<numChests;i++){
      const room=chestRooms[i%chestRooms.length];
      chests.push({
        x:room.cx*T+T/2+rand(-room.w*T/4,room.w*T/4),
        y:room.cy*T+T/2+rand(-room.h*T/4,room.h*T/4),
        opened:false
      });
    }

    // 传送阵（在boss房间）
    portals=[];
    for(const b of bosses){
      portals.push({x:b.x,y:b.y,active:false,bossRef:b});
    }

    // 出口（在最后一个房间）
    const exitRoom=map.rooms[map.rooms.length-1];
    portals.push({x:exitRoom.cx*T+T/2,y:exitRoom.cy*T+T/2,active:true,isExit:true});

    gameTime=cfg.time;
    particles=[];
    projectiles=[];
    state='playing';

    // 揭示起始房间周围
    revealAround(player.x,player.y,player.vis*T);
  },2500);
}

function showLevelTrans(title,desc){
  const el=document.getElementById('lvlTrans');
  document.getElementById('lvlTransTitle').textContent=title;
  document.getElementById('lvlTransDesc').textContent=desc;
  el.style.display='flex';
  setTimeout(()=>{el.style.display='none'},2400);
}

// ============ 地牢生成 ============
function generateDungeon(cfg){
  const w=cfg.w, h=cfg.h;
  const grid=Array(h).fill(null).map(()=>Array(w).fill(1));
  const rooms=[];

  // 生成房间
  for(let attempt=0;attempt<cfg.rooms*5&&rooms.length<cfg.rooms;attempt++){
    const rw=rand(5,9), rh=rand(4,7);
    const rx=rand(2,w-rw-2), ry=rand(2,h-rh-2);
    let ok=true;
    for(const r of rooms){
      if(rx<r.x+r.w+2&&rx+rw+2>r.x&&ry<r.y+r.h+2&&ry+rh+2>r.y){ok=false;break}
    }
    if(!ok) continue;
    for(let y=ry;y<ry+rh;y++) for(let x=rx;x<rx+rw;x++) grid[y][x]=0;
    rooms.push({x:rx,y:ry,w:rw,h:rh,cx:rx+Math.floor(rw/2),cy:ry+Math.floor(rh/2)});
  }

  // 走廊连接
  for(let i=1;i<rooms.length;i++){
    const a=rooms[i-1],b=rooms[i];
    let cx=a.cx,cy=a.cy;
    while(cx!==b.cx){grid[cy][cx]=0;cx+=cx<b.cx?1:-1}
    while(cy!==b.cy){grid[cy][cx]=0;cy+=cy<b.cy?1:-1}
    grid[cy][cx]=0;
  }

  // 额外连接（让迷宫不那么线性）
  for(let i=0;i<2;i++){
    if(rooms.length<4) break;
    const a=rooms[rand(0,rooms.length-1)];
    const b=rooms[rand(0,rooms.length-1)];
    if(a===b) continue;
    let cx=a.cx,cy=a.cy;
    while(cx!==b.cx){if(cy>=0&&cy<h&&cx>=0&&cx<w)grid[cy][cx]=0;cx+=cx<b.cx?1:-1}
    while(cy!==b.cy){if(cy>=0&&cy<h&&cx>=0&&cx<w)grid[cy][cx]=0;cy+=cy<b.cy?1:-1}
  }

  // 装饰地板
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    if(grid[y][x]===0&&Math.random()<.15) grid[y][x]=2; // 2=装饰地板
  }

  return{grid,rooms,w,h};
}

// ============ 迷雾 ============
function revealAround(px,py,r){
  const cr=Math.ceil(r/T)+1;
  const cx=Math.floor(px/T), cy=Math.floor(py/T);
  for(let dy=-cr;dy<=cr;dy++) for(let dx=-cr;dx<=cr;dx++){
    const tx=cx+dx, ty=cy+dy;
    if(tx<0||ty<0||tx>=map.w||ty>=map.h) continue;
    const d=Math.hypot(dx,dy);
    if(d*T<=r) explored[ty][tx]=true;
  }
}

function getVis(){
  let v=player.baseVis;
  for(const e of player.effects){
    if(e.eff==='orb') v*=3;
    if(e.eff==='torch') v+=2;
  }
  return v;
}

// ============ 游戏循环 ============
let lastTime=0;
function loop(ts){
  const dt=Math.min(ts-lastTime,50);
  lastTime=ts;
  animFrame++;

  if(state==='playing'){
    update(dt);
    render();
    updateHUD();
  }
  requestAnimationFrame(loop);
}

function update(dt){
  if(!player.alive) return;

  // 计时
  gameTime-=dt/1000;
  if(gameTime<=0){playerDie('时间耗尽，追杀者追上了你');return}

  // 玩家输入
  let dx=0,dy=0;
  if(keys['w']||keys['arrowup']) dy=-1;
  if(keys['s']||keys['arrowdown']) dy=1;
  if(keys['a']||keys['arrowleft']) dx=-1;
  if(keys['d']||keys['arrowright']) dx=1;
  if(joyActive){dx=joyDir.x;dy=joyDir.y}

  // 混乱效果：方向反转
  const confused=player.effects.some(e=>e.eff==='confuse');
  if(confused){dx=-dx;dy=-dy}

  // 移动
  const speed=player.speed*(player.effects.some(e=>e.eff==='adrenaline')?1.8:1)*(player.effects.some(e=>e.eff==='slow')?.5:1);
  if(dx!==0||dy!==0){
    const len=Math.hypot(dx,dy)||1;
    const mx=dx/len*speed, my=dy/len*speed;
    const nx=player.x+mx, ny=player.y+my;
    // 碰撞
    if(!isWall(nx,player.y)) player.x=nx;
    if(!isWall(player.x,ny)) player.y=ny;
    player.facing=Math.atan2(dy,dx);
    player.walkTimer+=dt;
    if(player.walkTimer>120){player.walkTimer=0;player.walkAnim=(player.walkAnim+1)%4}
  } else {
    player.walkAnim=0;
  }

  // 攻击冷却
  if(player.attackCD>0) player.attackCD-=dt;
  if(player.hurtCD>0) player.hurtCD-=dt;

  // 空格攻击
  if(keys[' ']||keys['z']){keys[' ']=false;keys['z']=false;doAttack()}

  // E交互
  if(keys['e']){keys['e']=false;doInteract()}

  // F传送
  if(keys['f']){keys['f']=false;doTeleport()}

  // 1-5 使用道具
  for(let i=1;i<=5;i++){
    if(keys[String(i)]){keys[String(i)]=false;useItem(i-1)}
  }

  // 效果计时
  for(let i=player.effects.length-1;i>=0;i--){
    player.effects[i].dur-=dt;
    if(player.effects[i].dur<=0) player.effects.splice(i,1);
  }

  // Boss更新
  for(const b of bosses){
    if(!b.alive) continue;
    updateBoss(b,dt);
  }

  // 弹道更新
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.x+=p.vx*dt/16; p.y+=p.vy*dt/16;
    p.life-=dt;
    // 碰玩家
    if(p.from==='boss'&&Math.hypot(p.x-player.x,p.y-player.y)<18){
      hurtPlayer(p.dmg);
      spawnParticles(player.x,player.y,'#e74c3c',5);
      projectiles.splice(i,1);continue;
    }
    // 碰墙
    if(isWall(p.x,p.y)||p.life<=0){projectiles.splice(i,1)}
  }

  // 粒子
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.life-=dt;
    p.vy+=.05; // gravity
    if(p.life<=0) particles.splice(i,1);
  }

  // 迷雾揭示
  player.vis=getVis();
  revealAround(player.x,player.y,player.vis*T);
}

// ============ 碰撞 ============
function isWall(x,y){
  const tx=Math.floor(x/T), ty=Math.floor(y/T);
  if(tx<0||ty<0||tx>=map.w||ty>=map.h) return true;
  return map.grid[ty][tx]===1;
}
function isWallTile(tx,ty){
  if(tx<0||ty<0||tx>=map.w||ty>=map.h) return true;
  return map.grid[ty][tx]===1;
}

// ============ 战斗 ============
function doAttack(){
  if(player.attackCD>0) return;
  player.attackCD=300;
  const atk=player.baseAtk+(player.weapon?player.weapon.atk:0);
  const range=player.weapon&&player.weapon.ranged?120:40;

  // 找最近的boss
  for(const b of bosses){
    if(!b.alive) continue;
    const d=Math.hypot(b.x-player.x,b.y-player.y);
    if(d<range){
      let dmg=atk;
      // 弱点加成
      if(player.weapon&&b.weakness===player.weapon.id) dmg=Math.floor(dmg*2.2);
      if(player.weapon&&player.weapon.poison){
        b.poisoned=true; b.poisonTimer=300;
      }
      b.curHp-=dmg;
      spawnParticles(b.x,b.y,'#ff6b35',8);
      // 武器耐久
      if(player.weapon){
        player.weapon.dur--;
        if(player.weapon.dur<=0){player.weapon=null}
      }
      if(b.curHp<=0) bossDie(b);
      break;
    }
  }

  // 攻击动画
  player.attackAnim=8;
}

function hurtPlayer(dmg){
  if(player.hurtCD>0) return;
  let actual=dmg;
  // 盔甲减伤
  if(player.armor){actual=Math.floor(actual*.5);player.armor.wear-=15;if(player.armor.wear<=0){player.armor=null}}
  // 护盾石
  if(player.shield&&player.shield.charges>0){player.shield.charges--;if(player.shield.charges<=0)player.shield=null;return}
  player.hp-=actual;
  player.hurtCD=400;
  spawnParticles(player.x,player.y,'#e74c3c',6);
  if(player.hp<=0){
    if(player.phoenix&&player.phoenix.charges>0){player.phoenix.charges--;if(player.phoenix.charges<=0)player.phoenix=null;player.hp=Math.floor(player.maxHp*.5);spawnParticles(player.x,player.y,'#ffd700',15)}
    else{playerDie('你倒在了黑暗中')}
  }
}

function playerDie(msg){
  player.alive=false;
  setTimeout(()=>{
    document.getElementById('endTitle').textContent='💀 游戏结束';
    document.getElementById('endTitle').style.color='#e74c3c';
    document.getElementById('endDesc').textContent=msg||'';
    document.getElementById('endScreen').style.display='flex';
  },800);
}

function bossDie(b){
  b.alive=false;
  spawnParticles(b.x,b.y,'#ffd700',20);
  // 激活传送阵
  for(const p of portals){
    if(p.bossRef===b) p.active=true;
  }
}

// ============ 交互 ============
function doInteract(){
  // 开箱子
  for(const c of chests){
    if(c.opened) continue;
    if(Math.hypot(c.x-player.x,c.y-player.y)<T*1.5){
      openChest(c);return;
    }
  }
  // 拾取地面道具？（已在箱子里处理）
}

function openChest(c){
  c.opened=true;
  const item=pickRandomItem();
  chestOpen=item;
  document.getElementById('chestIcon').textContent=item.icon;
  document.getElementById('chestName').textContent=item.name;
  document.getElementById('chestDesc').textContent=item.desc;
  document.getElementById('chestDlg').style.display='block';
}

function pickRandomItem(){
  const total=ITEMS.reduce((s,i)=>s+i.rarity,0);
  let r=Math.random()*total;
  for(const i of ITEMS){r-=i.rarity;if(r<=0)return{...i}}
  return{...ITEMS[6]}; // fallback herb
}

function closeChest(){
  document.getElementById('chestDlg').style.display='none';
  const item=chestOpen;
  if(!item) return;
  // 装备或放入背包
  if(item.type==='weapon'){player.weapon={...item}}
  else if(item.id==='armor'){player.armor={...item}}
  else if(item.id==='shield'){player.shield={...item}}
  else if(item.id==='phoenix'){player.phoenix={...item}}
  else if(item.id==='rope'){player.rope={...item}}
  else if(item.type==='consume'||item.type==='instant'||item.type==='buff'){
    if(item.type==='instant') useItemEffect(item);
    else if(item.type==='buff') applyBuff(item);
    else if(player.inventory.length<5) player.inventory.push({...item});
    else{ /* 背包满，替换最旧的 */ player.inventory.shift();player.inventory.push({...item})}
  }
  chestOpen=null;
}

function useItem(idx){
  if(idx>=player.inventory.length) return;
  const item=player.inventory[idx];
  if(item.type==='consume'){useItemEffect(item);player.inventory.splice(idx,1)}
  else if(item.type==='buff'){applyBuff(item);player.inventory.splice(idx,1)}
  else if(item.type==='instant'){useItemEffect(item);player.inventory.splice(idx,1)}
}

function useItemEffect(item){
  if(item.heal){player.hp=Math.min(player.maxHp,player.hp+item.heal);spawnParticles(player.x,player.y,'#2ecc71',8)}
  if(item.curePoison){player.effects=player.effects.filter(e=>e.eff!=='poison');spawnParticles(player.x,player.y,'#27ae60',6)}
  if(item.cureConfuse){player.effects=player.effects.filter(e=>e.eff!=='confuse');spawnParticles(player.x,player.y,'#9b59b6',6)}
  if(item.reveal){
    // 揭示30%迷雾
    const step=T*2;
    for(let y=0;y<map.h;y++) for(let x=0;x<map.w;x++){
      if(Math.random()<item.reveal) explored[y][x]=true;
    }
  }
  if(item.blind){for(const b of bosses){if(b.alive&&Math.hypot(b.x-player.x,b.y-player.y)<200)b.blindTimer=item.blind}}
}

function applyBuff(item){
  player.effects.push({eff:item.eff||item.id,dur:item.dur||3000});
  if(item.eff==='adrenaline'){}
  if(item.eff==='orb'){}
  if(item.eff==='torch'){}
  spawnParticles(player.x,player.y,'#f1c40f',6);
}

function doTeleport(){
  for(const p of portals){
    const d=Math.hypot(p.x-player.x,p.y-player.y);
    if(d<T*2){
      if(p.isExit){
        // 下一关
        curLevel++;
        if(curLevel>=LEVELS.length){
          victory();
        } else {
          initLevel();
        }
        return;
      }
      if(!p.active) continue;
      // 传送：朝玩家朝向方向距离地图30%
      const maxDist=Math.max(map.w,map.h)*T*.3;
      const ang=player.facing;
      let tx=player.x+Math.cos(ang)*maxDist;
      let ty=player.y+Math.sin(ang)*maxDist;
      // 确保不穿墙
      tx=clamp(tx,T*2,(map.w-2)*T);
      ty=clamp(ty,T*2,(map.h-2)*T);
      if(!isWall(tx,ty)){player.x=tx;player.y=ty;spawnParticles(player.x,player.y,'#00d4ff',10)}
      else {
        // 尝试附近位置
        for(let r=0;r<8;r++){
          const a=r*Math.PI/4;
          const nx=player.x+Math.cos(ang)*maxDist+Math.cos(a)*T*2;
          const ny=player.y+Math.sin(ang)*maxDist+Math.sin(a)*T*2;
          if(!isWall(nx,ny)){player.x=nx;player.y=ny;spawnParticles(player.x,player.y,'#00d4ff',10);break}
        }
      }
      return;
    }
  }
}

function victory(){
  document.getElementById('endTitle').textContent='🎉 逃出生天!';
  document.getElementById('endTitle').style.color='#2ecc71';
  document.getElementById('endDesc').textContent='张小龙和徐凝柔成功逃离了山洞!';
  document.getElementById('endScreen').style.display='flex';
}

function restartGame(){
  document.getElementById('endScreen').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('invBar').style.display='none';
  document.getElementById('titleScreen').classList.add('active');
  player=null;
  state='title';
}

// ============ Boss AI ============
function updateBoss(b,dt){
  if(b.blindTimer>0){b.blindTimer-=dt;return}
  const d=Math.hypot(b.x-player.x,b.y-player.y);

  // 在房间内巡逻/追踪
  if(d<T*6){
    // 追踪玩家
    const ang=Math.atan2(player.y-b.y,player.x-b.x);
    const sp=b.speed*(b.skillActive&&b.id==='lion'?2:1);
    const nx=b.x+Math.cos(ang)*sp;
    const ny=b.y+Math.sin(ang)*sp;
    if(!isWall(nx,b.y)) b.x=nx;
    if(!isWall(b.x,ny)) b.y=ny;

    // 近身攻击
    if(d<T*1.5&&b.attackCD<=0){
      b.attackCD=800;
      let dmg=b.atk;
      if(b.skillActive&&b.id==='lion') dmg=Math.floor(dmg*2.5);
      hurtPlayer(dmg);
    }

    // 技能
    b.skillTimer-=dt;
    if(b.skillTimer<=0&&d<T*5){
      b.skillTimer=b.skillCD;
      activateBossSkill(b);
    }
  } else {
    // 巡逻
    b.patrol.angle+=.005;
    const px=b.room.cx*T+T/2+Math.cos(b.patrol.angle)*T*2;
    const py=b.room.cy*T+T/2+Math.sin(b.patrol.angle)*T*2;
    const ang=Math.atan2(py-b.y,px-b.x);
    const nx=b.x+Math.cos(ang)*b.speed*.5;
    const ny=b.y+Math.sin(ang)*b.speed*.5;
    if(!isWall(nx,b.y)) b.x=nx;
    if(!isWall(b.x,ny)) b.y=ny;
  }

  if(b.attackCD>0) b.attackCD-=dt;

  // 技能持续
  if(b.skillActive){
    b.skillDurLeft-=dt;
    if(b.skillDurLeft<=0) b.skillActive=false;
  }

  // 中毒
  if(b.poisoned){
    b.poisonTimer-=dt;
    if(animFrame%30===0) b.curHp-=3;
    if(b.poisonTimer<=0) b.poisoned=false;
  }

  // 深渊领主三阶段
  if(b.id==='abyss'){
    const hpPct=b.curHp/b.maxHp;
    if(hpPct<.66&&b.phase<1){b.phase=1;b.speed*=1.3;b.atk=Math.floor(b.atk*1.2)}
    if(hpPct<.33&&b.phase<2){b.phase=2;b.speed*=1.3;b.atk=Math.floor(b.atk*1.3);b.size+=4}
  }
}

function activateBossSkill(b){
  switch(b.id){
    case 'golem':
      // 减速波
      if(!player.effects.some(e=>e.eff==='slow')){
        player.effects.push({eff:'slow',dur:b.skillDur});
        spawnParticles(player.x,player.y,'#3498db',8);
      }
      break;
    case 'spider':
      // 中毒
      if(!player.effects.some(e=>e.eff==='poison')){
        player.effects.push({eff:'poison',dur:b.skillDur});
      }
      // 发射毒弹
      const ang=Math.atan2(player.y-b.y,player.x-b.x);
      projectiles.push({x:b.x,y:b.y,vx:Math.cos(ang)*3,vy:Math.sin(ang)*3,dmg:b.atk,life:2000,from:'boss',color:'#27ae60'});
      break;
    case 'lion':
      b.skillActive=true;
      b.skillDurLeft=b.skillDur;
      break;
    case 'warlock':
      // 混乱
      if(!player.effects.some(e=>e.eff==='confuse')){
        player.effects.push({eff:'confuse',dur:b.skillDur});
        spawnParticles(player.x,player.y,'#9b59b6',10);
      }
      // 幻影弹
      for(let i=0;i<3;i++){
        const a=Math.atan2(player.y-b.y,player.x-b.x)+(i-1)*.3;
        projectiles.push({x:b.x,y:b.y,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,dmg:b.atk,life:2500,from:'boss',color:'#9b59b6'});
      }
      break;
    case 'abyss':
      // 多段攻击
      for(let i=0;i<5;i++){
        const a=Math.atan2(player.y-b.y,player.x-b.x)+i*Math.PI*.4;
        projectiles.push({x:b.x,y:b.y,vx:Math.cos(a)*2,vy:Math.sin(a)*2,dmg:b.atk,life:3000,from:'boss',color:'#2c3e50'});
      }
      break;
  }
}

// ============ 粒子 ============
function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    particles.push({
      x,y,vx:randf(-2,2),vy:randf(-3,0),
      life:rand(300,700),maxLife:700,
      color,size:rand(2,5)
    });
  }
}

// ============ 渲染 ============
function render(){
  const W=canvas.width, H=canvas.height;
  ctx.fillStyle='#0a0510';
  ctx.fillRect(0,0,W,H);

  if(!map||!player) return;

  // 相机
  camera.x=player.x-W/2;
  camera.y=player.y-H/2;

  // 可视范围
  const startC=Math.floor(camera.x/T)-1;
  const startR=Math.floor(camera.y/T)-1;
  const endC=startC+Math.ceil(W/T)+2;
  const endR=startR+Math.ceil(H/T)+2;

  const vis=getVis();
  const visPx=vis*T;

  // 绘制地图
  for(let r=startR;r<=endR;r++){
    for(let c=startC;c<=endC;c++){
      if(r<0||c<0||r>=map.h||c>=map.w) continue;
      const d=Math.hypot(c*T+T/2-player.x,r*T+T/2-player.y);
      if(d>visPx+T&&!explored[r][c]) continue;
      if(d>visPx+T*3) continue;

      const sx=c*T-camera.x, sy=r*T-camera.y;
      const tile=map.grid[r][c];
      const alpha=d<=visPx?1:explored[r][c]?.25:0;
      if(alpha<=0) continue;

      ctx.globalAlpha=alpha;

      if(tile===1){
        // 墙壁
        ctx.fillStyle='#2a1a3a';
        ctx.fillRect(sx,sy,T,T);
        ctx.fillStyle='#3a2a4a';
        ctx.fillRect(sx+1,sy+1,T-2,T-2);
        // 砖纹
        ctx.fillStyle='#221432';
        ctx.fillRect(sx+T/2-1,sy,2,T);
        ctx.fillRect(sx,sy+T/2-1,T,2);
      } else {
        // 地板
        ctx.fillStyle=tile===2?'#18101e':'#141020';
        ctx.fillRect(sx,sy,T,T);
        // 地砖纹
        if((c+r)%2===0){
          ctx.fillStyle='rgba(255,255,255,.015)';
          ctx.fillRect(sx,sy,T,T);
        }
        // 偶尔有小石头
        if(tile===2){
          ctx.fillStyle='#1e1428';
          ctx.fillRect(sx+8,sy+10,6,4);
        }
      }
      ctx.globalAlpha=1;
    }
  }

  // 绘制传送阵
  for(const p of portals){
    const d=Math.hypot(p.x-player.x,p.y-player.y);
    if(d>visPx+T) continue;
    const sx=p.x-camera.x, sy=p.y-camera.y;
    const alpha=d<=visPx?1:.3;
    ctx.globalAlpha=alpha;
    if(p.isExit){
      // 出口 - 金色
      ctx.fillStyle='#ffd700';
      ctx.beginPath();ctx.arc(sx,sy,14,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#ffaa00';ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='12px monospace';ctx.textAlign='center';
      ctx.fillText('出口',sx,sy+4);
    } else {
      // Boss传送阵
      ctx.fillStyle=p.active?'#00d4ff':'#333';
      ctx.beginPath();ctx.arc(sx,sy,12,0,Math.PI*2);ctx.fill();
      if(p.active){
        ctx.strokeStyle='#0088ff';ctx.lineWidth=2;ctx.stroke();
        // 旋转动画
        const rot=animFrame*.03;
        for(let i=0;i<4;i++){
          const a=rot+i*Math.PI/2;
          ctx.fillStyle='#00d4ff';
          ctx.fillRect(sx+Math.cos(a)*8-2,sy+Math.sin(a)*8-2,4,4);
        }
      }
    }
    ctx.globalAlpha=1;
  }

  // 绘制箱子
  for(const c of chests){
    const d=Math.hypot(c.x-player.x,c.y-player.y);
    if(d>visPx) continue;
    const sx=c.x-camera.x, sy=c.y-camera.y;
    if(c.opened){
      ctx.fillStyle='#3a2a1a';
      ctx.fillRect(sx-8,sy-6,16,12);
    } else {
      // 闭合宝箱
      ctx.fillStyle='#8B4513';
      ctx.fillRect(sx-10,sy-8,20,16);
      ctx.fillStyle='#DAA520';
      ctx.fillRect(sx-10,sy-8,20,3);
      ctx.fillRect(sx-2,sy-4,4,4); // 锁
      // 闪光
      if(animFrame%60<30){
        ctx.fillStyle='rgba(255,215,0,.3)';
        ctx.beginPath();ctx.arc(sx,sy,14,0,Math.PI*2);ctx.fill();
      }
    }
  }

  // 绘制Boss
  for(const b of bosses){
    if(!b.alive) continue;
    const d=Math.hypot(b.x-player.x,b.y-player.y);
    if(d>visPx+T) continue;
    const sx=b.x-camera.x, sy=b.y-camera.y;
    const alpha=d<=visPx?1:.3;
    ctx.globalAlpha=alpha;

    // Boss身体
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(sx,sy,b.size/2,0,Math.PI*2);ctx.fill();

    // Boss眼睛
    const eyeAng=Math.atan2(player.y-b.y,player.x-b.x);
    ctx.fillStyle='#ff0000';
    ctx.beginPath();ctx.arc(sx+Math.cos(eyeAng-.3)*6,sy+Math.sin(eyeAng-.3)*6-4,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+Math.cos(eyeAng+.3)*6,sy+Math.sin(eyeAng+.3)*6-4,3,0,Math.PI*2);ctx.fill();

    // Boss技能特效
    if(b.skillActive){
      ctx.strokeStyle=b.id==='lion'?'#e67e22':'#9b59b6';
      ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(sx,sy,b.size/2+6,0,Math.PI*2);ctx.stroke();
    }

    // Boss名字
    ctx.fillStyle='#ff6b35';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText(b.name,sx,sy-b.size/2-6);

    // 中毒效果
    if(b.poisoned){
      ctx.fillStyle='rgba(46,204,113,.4)';
      ctx.beginPath();ctx.arc(sx,sy,b.size/2+3,0,Math.PI*2);ctx.fill();
    }

    ctx.globalAlpha=1;
  }

  // 绘制弹道
  for(const p of projectiles){
    const sx=p.x-camera.x, sy=p.y-camera.y;
    ctx.fillStyle=p.color||'#ff6b35';
    ctx.beginPath();ctx.arc(sx,sy,4,0,Math.PI*2);ctx.fill();
  }

  // 绘制玩家
  drawPlayer();

  // 绘制粒子
  for(const p of particles){
    const sx=p.x-camera.x, sy=p.y-camera.y;
    const alpha=p.life/p.maxLife;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=p.color;
    ctx.fillRect(sx-p.size/2,sy-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;

  // 迷雾边缘渐变
  const fogGrad=ctx.createRadialGradient(W/2,H/2,visPx*.6,W/2,H/2,visPx*1.2);
  fogGrad.addColorStop(0,'rgba(10,5,16,0)');
  fogGrad.addColorStop(1,'rgba(10,5,16,1)');
  ctx.fillStyle=fogGrad;
  ctx.fillRect(0,0,W,H);

  // 受伤闪烁
  if(player.hurtCD>200){
    ctx.fillStyle='rgba(231,76,60,.15)';
    ctx.fillRect(0,0,W,H);
  }

  // 混乱效果
  if(player.effects.some(e=>e.eff==='confuse')){
    ctx.fillStyle='rgba(155,89,182,.08)';
    ctx.fillRect(0,0,W,H);
  }

  // 中毒效果
  if(player.effects.some(e=>e.eff==='poison')){
    if(animFrame%20<10){
      ctx.fillStyle='rgba(46,204,113,.05)';
      ctx.fillRect(0,0,W,H);
    }
    // 中毒掉血
    if(animFrame%60===0) player.hp=Math.max(0,player.hp-5);
    if(player.hp<=0) playerDie('中毒身亡');
  }

  // 攻击动画 - 挥砍弧线
  if(player.attackCD>200){
    ctx.strokeStyle='rgba(255,255,255,.6)';
    ctx.lineWidth=3;
    const ax=W/2+Math.cos(player.facing)*20;
    const ay=H/2+Math.sin(player.facing)*20;
    ctx.beginPath();
    ctx.arc(ax,ay,18,player.facing-.5,player.facing+.5);
    ctx.stroke();
  }

  // 小地图
  renderMinimap();
}

function drawPlayer(){
  const sx=player.x-camera.x, sy=player.y-camera.y;
  const facing=player.facing;
  const bobY=Math.sin(player.walkAnim*Math.PI/2)*2;

  // 阴影
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.beginPath();ctx.ellipse(sx,sy+8,8,4,0,0,Math.PI*2);ctx.fill();

  // 身体
  const bodyColor=player.charIdx===0?'#3498db':'#e91e63';
  ctx.fillStyle=bodyColor;
  ctx.fillRect(sx-6,sy-10+bobY,12,14);

  // 头
  const skinColor='#f5c6a0';
  ctx.fillStyle=skinColor;
  ctx.beginPath();ctx.arc(sx,sy-14+bobY,7,0,Math.PI*2);ctx.fill();

  // 头发
  ctx.fillStyle=player.charIdx===0?'#2c3e50':'#4a2828';
  ctx.beginPath();ctx.arc(sx,sy-17+bobY,6,Math.PI,0);ctx.fill();

  // 眼睛方向
  const ex=Math.cos(facing)*2, ey=Math.sin(facing)*1;
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(sx-2+ex,sy-14+ey+bobY,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(sx+2+ex,sy-14+ey+bobY,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(sx-2+ex,sy-14+ey+bobY,1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(sx+2+ex,sy-14+ey+bobY,1,0,Math.PI*2);ctx.fill();

  // 腿（走路动画）
  const legOffset=Math.sin(player.walkAnim*Math.PI/2)*3;
  ctx.fillStyle='#2c3e50';
  ctx.fillRect(sx-4,sy+4+bobY,4,6+legOffset);
  ctx.fillRect(sx+1,sy+4+bobY,4,6-legOffset);

  // 武器
  if(player.weapon){
    ctx.save();
    ctx.translate(sx,sy-4+bobY);
    ctx.rotate(facing);
    ctx.fillStyle='#aaa';
    if(player.weapon.id==='sword'){
      ctx.fillRect(8,-1,14,3);
      ctx.fillStyle='#8B4513';
      ctx.fillRect(5,-2,4,5);
    } else if(player.weapon.id==='crossbow'){
      ctx.fillRect(6,-3,8,6);
      ctx.fillStyle='#8B4513';
      ctx.fillRect(14,-1,6,2);
    } else if(player.weapon.id==='dagger'){
      ctx.fillStyle='#aaffaa';
      ctx.fillRect(8,-1,8,2);
    }
    ctx.restore();
  }

  // 盔甲指示
  if(player.armor){
    ctx.strokeStyle='#95a5a6';
    ctx.lineWidth=2;
    ctx.strokeRect(sx-7,sy-11+bobY,14,16);
  }

  // 名字
  ctx.fillStyle='#fff';ctx.font='9px monospace';ctx.textAlign='center';
  ctx.fillText(player.name,sx,sy-24+bobY);
}

function renderMinimap(){
  if(isMobile) return;
  const mw=100, mh=100;
  mmCtx.fillStyle='#0a0510';
  mmCtx.fillRect(0,0,mw,mh);

  if(!map) return;
  const scale=Math.min(mw/map.w,mh/map.h);
  const ox=(mw-map.w*scale)/2, oy=(mh-map.h*scale)/2;

  for(let r=0;r<map.h;r++){
    for(let c=0;c<map.w;c++){
      if(!explored[r][c]) continue;
      mmCtx.fillStyle=map.grid[r][c]===1?'#3a2a4a':'#1a1020';
      mmCtx.fillRect(ox+c*scale,oy+r*scale,Math.max(1,scale),Math.max(1,scale));
    }
  }

  // 玩家点
  mmCtx.fillStyle='#3498db';
  mmCtx.fillRect(ox+player.x/T*scale-2,oy+player.y/T*scale-2,4,4);

  // Boss点
  for(const b of bosses){
    if(!b.alive) continue;
    const d=Math.hypot(b.x-player.x,b.y-player.y);
    if(d>getVis()*T*2) continue;
    mmCtx.fillStyle='#e74c3c';
    mmCtx.fillRect(ox+b.x/T*scale-1,oy+b.y/T*scale-1,3,3);
  }

  // 出口
  for(const p of portals){
    if(p.isExit){
      mmCtx.fillStyle='#ffd700';
      mmCtx.fillRect(ox+p.x/T*scale-2,oy+p.y/T*scale-2,4,4);
    }
  }
}

// ============ HUD ============
function updateHUD(){
  const pct=Math.max(0,player.hp/player.maxHp*100);
  document.getElementById('hpFill').style.width=pct+'%';
  document.getElementById('hpText').textContent=Math.ceil(player.hp)+'/'+player.maxHp;
  document.getElementById('lvlName').textContent=LEVELS[curLevel].name+' · '+Math.ceil(gameTime)+'s';

  // 状态标签
  let tags='';
  for(const e of player.effects){
    const cls=e.eff==='slow'?'slow':e.eff==='poison'?'poison':e.eff==='confuse'?'confuse':e.eff==='orb'?'orb':e.eff==='adrenaline'?'adrenaline':'';
    const names={slow:'减速',poison:'中毒',confuse:'混乱',orb:'宝珠',adrenaline:'兴奋',torch:'火把'};
    if(cls) tags+=`<span class="stag ${cls}">${names[e.eff]||e.eff}</span>`;
  }
  if(player.armor) tags+=`<span class="stag armor">🛡${player.armor.wear}</span>`;
  document.getElementById('statusTags').innerHTML=tags;

  // 背包
  let inv='';
  for(let i=0;i<5;i++){
    const item=player.inventory[i];
    if(item){
      inv+=`<div class="inv-s" onclick="useItem(${i})"><span class="key">${i+1}</span>${item.icon}${item.dur?`<span class="cnt">${item.dur}</span>`:''}</div>`;
    } else {
      inv+=`<div class="inv-s"><span class="key">${i+1}</span></div>`;
    }
  }
  document.getElementById('invBar').innerHTML=inv;

  // Boss血条
  let nearBoss=null;
  for(const b of bosses){
    if(b.alive&&Math.hypot(b.x-player.x,b.y-player.y)<T*8){nearBoss=b;break}
  }
  const bossBar=document.getElementById('bossBar');
  if(nearBoss){
    bossBar.style.display='block';
    document.getElementById('bossName').textContent=nearBoss.name+(nearBoss.skillActive?' ⚡':'');
    document.getElementById('bossHpFill').style.width=Math.max(0,nearBoss.curHp/nearBoss.maxHp*100)+'%';
  } else {
    bossBar.style.display='none';
  }
}

// ============ 手机控件 ============
function initJoystick(){
  const area=document.getElementById('joyArea');
  const knob=document.getElementById('joyKnob');
  const base=document.getElementById('joyBase');
  let touchId=null;
  const maxR=35; // 摇杆最大偏移半径

  area.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.changedTouches[0];
    touchId=t.identifier;
    updateJoy(t);
  });
  area.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier===touchId) updateJoy(t);
    }
  });
  area.addEventListener('touchend',e=>{
    for(const t of e.changedTouches){
      if(t.identifier===touchId){
        touchId=null;
        joyActive=false;
        joyDir={x:0,y:0};
        knob.style.left='30px';knob.style.top='30px';
      }
    }
  });

  function updateJoy(t){
    const rect=base.getBoundingClientRect();
    const cx=rect.left+rect.width/2;
    const cy=rect.top+rect.height/2;
    let dx=t.clientX-cx, dy=t.clientY-cy;
    const d=Math.hypot(dx,dy);
    if(d>maxR){dx=dx/d*maxR;dy=dy/d*maxR}
    knob.style.left=(30+dx)+'px';
    knob.style.top=(30+dy)+'px';
    joyActive=true;
    joyDir={x:dx/maxR,y:dy/maxR};
  }
}

function mobAttack(){doAttack()}
function mobUse(){
  // 使用第一个可用的背包道具
  if(player.inventory.length>0) useItem(0);
  else doInteract(); // 如果背包空就开箱子
}
function mobTeleport(){doTeleport()}
