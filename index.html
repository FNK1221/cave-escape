<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>山洞逃生 Cave Escape</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;font-family:'Courier New',monospace;user-select:none;-webkit-user-select:none}
canvas{display:block;position:fixed;top:0;left:0}

#rotateHint{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0510;z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#rotateHint .phone{width:50px;height:80px;border:3px solid #ff6b35;border-radius:8px;animation:rotP 2s ease-in-out infinite}
#rotateHint p{color:#ff6b35;font-size:16px}
@keyframes rotP{0%,100%{transform:rotate(0deg)}50%{transform:rotate(90deg)}}
@media(orientation:portrait) and (max-width:900px){#rotateHint{display:flex!important}}

.overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.overlay.active{display:flex}

#titleScreen{background:linear-gradient(180deg,#1a0a2e,#0d0520)}
#titleScreen h1{font-size:clamp(24px,5vw,44px);color:#ff6b35;text-shadow:0 0 20px #ff6b35,0 0 40px rgba(255,107,53,.3);margin-bottom:4px;letter-spacing:2px}
#titleScreen .sub{color:#665580;font-size:clamp(10px,2vw,13px);margin-bottom:24px}
.btn{padding:11px 24px;font-size:clamp(12px,2.5vw,17px);background:#ff6b35;color:#fff;border:none;border-radius:8px;cursor:pointer;margin:4px;font-family:inherit;transition:transform .12s,background .12s}
.btn:hover{background:#ff8855}
.btn:active{transform:scale(.92)}
.btn.secondary{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15)}

#charScreen{background:linear-gradient(180deg,#1a0a2e,#0d0520)}
#charScreen h2{color:#ff6b35;font-size:clamp(16px,3.5vw,26px);margin-bottom:14px}
.chars{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.char-card{padding:12px 16px;background:rgba(255,255,255,.04);border:2px solid #333;border-radius:10px;cursor:pointer;text-align:center;transition:all .25s;min-width:110px}
.char-card:hover,.char-card.sel{border-color:#ff6b35;background:rgba(255,107,53,.08)}
.char-card canvas{display:block;margin:0 auto 4px}
.char-card .nm{color:#fff;font-size:13px;margin-top:2px}
.char-card .desc{color:#8877aa;font-size:9px;margin-top:2px}

#hud{position:fixed;top:0;left:0;width:100%;padding:3px 10px;z-index:50;pointer-events:none;display:none}
.hud-row{display:flex;align-items:center;gap:6px}
.hp-bar{width:130px;height:13px;background:#222;border-radius:7px;overflow:hidden;border:1px solid #444}
.hp-fill{height:100%;background:linear-gradient(90deg,#e74c3c,#ff6b6b);border-radius:7px;transition:width .25s}
.hp-text{color:#ccc;font-size:11px}
.gold-tag{color:#ffd700;font-size:11px;margin-left:6px}
.weapon-tag{color:#aaa;font-size:10px;margin-left:4px;background:rgba(255,255,255,.05);padding:1px 5px;border-radius:3px}
.level-name{color:#ff6b35;font-size:11px;margin-left:auto}
.status-tags{display:flex;gap:2px;margin-top:1px}
.stag{padding:1px 4px;border-radius:3px;font-size:8px;color:#fff}
.stag.slow{background:#3498db}.stag.poison{background:#27ae60}.stag.confuse{background:#9b59b6}.stag.orb{background:#f1c40f}.stag.adrenaline{background:#e67e22}.stag.armor{background:#95a5a6}.stag.torch{background:#c0392b}.stag.dash{background:#00bcd4}

#invBar{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);display:none;gap:3px;z-index:50}
.inv-s{width:40px;height:40px;background:rgba(0,0,0,.75);border:2px solid #444;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;position:relative;cursor:pointer}
.inv-s:active{border-color:#ff6b35}
.inv-s .cnt{position:absolute;bottom:1px;right:2px;font-size:7px;color:#fff}
.inv-s .key{position:absolute;top:1px;left:2px;font-size:6px;color:#888}

#joyArea{position:fixed;bottom:10px;left:14px;width:96px;height:96px;z-index:60;display:none}
#joyBase{width:96px;height:96px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:50%;position:relative}
#joyKnob{width:38px;height:38px;background:rgba(255,255,255,.18);border-radius:50%;position:absolute;top:29px;left:29px}
.mob-btns{position:fixed;bottom:12px;right:14px;display:none;gap:5px;z-index:60}
.mob-btn{width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,.15);background:rgba(0,0,0,.5);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.mob-btn:active{background:rgba(255,107,53,.3);border-color:#ff6b35}
.mob-btn.atk{background:rgba(231,76,60,.3);border-color:rgba(231,76,60,.5)}
.mob-btn.dash{background:rgba(0,188,212,.2);border-color:rgba(0,188,212,.4)}

#lvlTrans{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column}
#lvlTrans h2{color:#ff6b35;font-size:clamp(20px,5vw,34px)}
#lvlTrans p{color:#8877aa;font-size:clamp(10px,2.5vw,13px);margin-top:5px}

#chestDlg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(15,8,25,.96);border:2px solid #ff6b35;border-radius:12px;padding:16px 22px;z-index:150;display:none;text-align:center;min-width:170px}
#chestDlg h3{color:#ffd700;font-size:17px;margin-bottom:5px}
#chestDlg .item{font-size:20px;margin:5px 0}
#chestDlg .iname{color:#ffd700;font-size:14px}
#chestDlg .idesc{color:#9988bb;font-size:10px;margin-top:2px}

#shopDlg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(15,8,25,.96);border:2px solid #ffd700;border-radius:12px;padding:16px 20px;z-index:150;display:none;min-width:220px}
#shopDlg h3{color:#ffd700;font-size:16px;margin-bottom:8px;text-align:center}
.shop-item{display:flex;align-items:center;gap:8px;padding:6px;border-radius:6px;cursor:pointer;margin-bottom:4px;background:rgba(255,255,255,.03)}
.shop-item:active{background:rgba(255,107,53,.15)}
.shop-item .si-icon{font-size:18px}
.shop-item .si-info{flex:1}
.shop-item .si-name{color:#ddd;font-size:12px}
.shop-item .si-desc{color:#8877aa;font-size:9px}
.shop-item .si-cost{color:#ffd700;font-size:11px}

#dialogBox{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(10,5,16,.92);border:1px solid #ff6b35;border-radius:8px;padding:10px 16px;z-index:140;display:none;max-width:400px;text-align:center}
#dialogBox .dname{color:#ff6b35;font-size:11px;margin-bottom:3px}
#dialogBox .dtext{color:#ccc;font-size:12px;line-height:1.5}

#endScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column}
#endScreen h2{font-size:clamp(20px,5vw,36px);margin-bottom:8px}
#endScreen p{color:#9988bb;font-size:12px;margin-bottom:14px}
#endScreen .stats{color:#8877aa;font-size:10px;line-height:1.8;margin-bottom:12px}
#endScreen .btn{margin-top:5px}

#bossBar{position:fixed;top:32px;left:50%;transform:translateX(-50%);display:none;z-index:55;text-align:center}
#bossBar .bname{color:#ff6b35;font-size:11px;margin-bottom:2px}
#bossBar .bhp{width:190px;height:9px;background:#333;border-radius:5px;overflow:hidden}
#bossBar .bhp-fill{height:100%;background:#e74c3c;border-radius:5px;transition:width .2s}

#minimap{position:fixed;top:26px;right:5px;z-index:55;border:1px solid #333;border-radius:4px;opacity:.65}

/* 伤害数字动画 */
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-30px)}}
</style>
</head>
<body>

<div id="rotateHint">
  <div class="phone"></div>
  <p>请横屏游玩 🔄</p>
</div>

<div id="titleScreen" class="overlay active">
  <h1>⛏ 山洞逃生</h1>
  <div class="sub">张小龙 &amp; 徐凝柔 · 洞穴逃亡</div>
  <button class="btn" onclick="showCharSelect()">开始游戏</button>
  <button class="btn secondary" onclick="showHow()">操作说明</button>
  <div id="howBox" style="display:none;color:#9988bb;font-size:11px;max-width:360px;margin-top:12px;line-height:1.9;text-align:left">
    <b style="color:#ff6b35">PC:</b> WASD移动 | 空格攻击 | Shift闪避 | E交互/开箱 | F传送 | 1-5使用道具<br>
    <b style="color:#ff6b35">手机:</b> 左摇杆移动 | ⚔攻 💨闪 💊用 ✦传<br>
    <b style="color:#ff6b35">目标:</b> 探索地牢→开箱拿道具→打小怪→击败Boss→传送阵前进→找到出口逃出山洞<br>
    <b style="color:#ff6b35">闪避:</b> 无敌0.3秒，3秒冷却，可穿怪
  </div>
</div>

<div id="charScreen" class="overlay">
  <h2>选择角色</h2>
  <div class="chars">
    <div class="char-card sel" onclick="pickChar(0,this)">
      <canvas id="charPreview0" width="48" height="64"></canvas>
      <div class="nm">张小龙</div>
      <div class="desc">HP120 攻击+2 移速快</div>
    </div>
    <div class="char-card" onclick="pickChar(1,this)">
      <canvas id="charPreview1" width="48" height="64"></canvas>
      <div class="nm">徐凝柔</div>
      <div class="desc">HP100 视野+2 回复快</div>
    </div>
  </div>
  <button class="btn" onclick="startGame()">出发</button>
</div>

<canvas id="gameCanvas"></canvas>

<div id="hud">
  <div class="hud-row">
    <div class="hp-bar"><div class="hp-fill" id="hpFill" style="width:100%"></div></div>
    <span class="hp-text" id="hpText">100/100</span>
    <span class="gold-tag" id="goldTag">💰0</span>
    <span class="weapon-tag" id="wpnTag">👊拳头</span>
    <span class="level-name" id="lvlName"></span>
  </div>
  <div class="status-tags" id="statusTags"></div>
</div>

<div id="invBar"></div>

<div id="bossBar"><div class="bname" id="bossName"></div><div class="bhp"><div class="bhp-fill" id="bossHpFill"></div></div></div>

<canvas id="minimap" width="110" height="110"></canvas>

<div id="joyArea"><div id="joyBase"><div id="joyKnob"></div></div></div>
<div class="mob-btns" id="mobBtns">
  <div class="mob-btn atk" ontouchstart="mobAttack()" onmousedown="mobAttack()">⚔</div>
  <div class="mob-btn dash" ontouchstart="mobDash()" onmousedown="mobDash()">💨</div>
  <div class="mob-btn" ontouchstart="mobInteract()" onmousedown="mobInteract()">📦</div>
  <div class="mob-btn" ontouchstart="mobUse()" onmousedown="mobUse()">💊</div>
  <div class="mob-btn" ontouchstart="mobTeleport()" onmousedown="mobTeleport()">✦</div>
</div>

<div id="lvlTrans"><h2 id="lvlTransTitle"></h2><p id="lvlTransDesc"></p></div>

<div id="chestDlg">
  <h3>🎁 宝箱</h3>
  <div class="item" id="chestIcon"></div>
  <div class="iname" id="chestName"></div>
  <div class="idesc" id="chestDesc"></div>
  <button class="btn" style="margin-top:10px;padding:7px 18px;font-size:13px" onclick="closeChest()">收下</button>
</div>

<div id="shopDlg">
  <h3>🏪 神秘商人</h3>
  <div id="shopItems"></div>
  <button class="btn secondary" style="margin-top:8px;padding:6px 14px;font-size:11px" onclick="closeShop()">离开</button>
</div>

<div id="dialogBox">
  <div class="dname" id="dialogName"></div>
  <div class="dtext" id="dialogText"></div>
</div>

<div id="endScreen">
  <h2 id="endTitle"></h2>
  <p id="endDesc"></p>
  <div class="stats" id="endStats"></div>
  <button class="btn" onclick="restartGame()">再来一次</button>
</div>

<script>
// ============ 工具 ============
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const randf=(a,b)=>Math.random()*(b-a)+a;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const lerp=(a,b,t)=>a+(b-a)*t;

// ============ 配置 ============
const T=32;
const LEVELS=[
  {name:"幽暗石窟",w:48,h:38,rooms:8,bosses:1,time:1800,vis:5.5,mobCount:6,shopChance:.3},
  {name:"腐化地道",w:52,h:42,rooms:10,bosses:2,time:1500,vis:5,mobCount:9,shopChance:.25},
  {name:"熔岩深渊",w:58,h:45,rooms:12,bosses:2,time:1200,vis:4.5,mobCount:12,shopChance:.2},
  {name:"幻觉迷宫",w:62,h:48,rooms:14,bosses:3,time:1000,vis:4,mobCount:15,shopChance:.15},
  {name:"深渊终地",w:66,h:52,rooms:16,bosses:3,time:900,vis:3.5,mobCount:18,shopChance:.1}
];

const ITEMS=[
  {id:'orb',name:'发光宝珠',icon:'🔮',rarity:.07,desc:'视野x3 45秒',type:'buff',dur:2700,eff:'orb'},
  {id:'adrenaline',name:'肾上腺素',icon:'💉',rarity:.08,desc:'移速+80% 20秒',type:'buff',dur:1200,eff:'adrenaline'},
  {id:'armor',name:'盔甲套装',icon:'🛡️',rarity:.06,desc:'减伤50% 磨损100',type:'equip',wear:100},
  {id:'sword',name:'铁剑',icon:'⚔️',rarity:.10,desc:'攻击+20 耐久60',type:'weapon',dur:60,atk:20},
  {id:'crossbow',name:'石弓',icon:'🏹',rarity:.08,desc:'攻击+15 12箭 远程',type:'weapon',dur:12,atk:15,ranged:true},
  {id:'dagger',name:'毒匕首',icon:'🗡️',rarity:.07,desc:'攻击+10+毒',type:'weapon',dur:30,atk:10,poison:true},
  {id:'herb',name:'草药包',icon:'🌿',rarity:.12,desc:'回复40HP',type:'consume',heal:40},
  {id:'antidote',name:'解毒药',icon:'💊',rarity:.10,desc:'清除中毒',type:'consume',curePoison:true},
  {id:'clarity',name:'清醒药',icon:'💧',rarity:.08,desc:'清除混乱',type:'consume',cureConfuse:true},
  {id:'map',name:'地图残页',icon:'🗺️',rarity:.06,desc:'揭示30%迷雾',type:'instant',reveal:.3},
  {id:'smoke',name:'烟雾弹',icon:'💨',rarity:.07,desc:'Boss失目标10秒',type:'instant',blind:600},
  {id:'shield',name:'护盾石',icon:'🪨',rarity:.06,desc:'吸收一次伤害',type:'equip',charges:1},
  {id:'torch',name:'火把',icon:'🔥',rarity:.09,desc:'视野+2 60秒',type:'buff',dur:3600,eff:'torch'},
  {id:'rope',name:'钩爪绳索',icon:'🪝',rarity:.06,desc:'越墙5次',type:'equip',charges:5},
  {id:'bandage',name:'绷带',icon:'🩹',rarity:.13,desc:'回复20HP',type:'consume',heal:20},
  {id:'phoenix',name:'不死药',icon:'✨',rarity:.01,desc:'死亡时复活',type:'equip',charges:1},
  {id:'bomb',name:'炸弹',icon:'💣',rarity:.05,desc:'范围60伤害',type:'instant',areaDmg:60},
  {id:'magnet',name:'吸金磁铁',icon:'🧲',rarity:.04,desc:'金币吸引范围x3',type:'buff',dur:3000,eff:'magnet'}
];

const BOSS_TYPES=[
  {id:'golem',name:'石傀儡',color:'#7f8c8d',size:28,hp:180,atk:12,speed:1.2,skill:'slow',skillDur:480,skillCD:300,desc:'震地波-减速50%',weakness:'sword'},
  {id:'spider',name:'毒雾蛛后',color:'#8e44ad',size:24,hp:140,atk:8,speed:1.8,skill:'poison',skillDur:600,skillCD:360,desc:'毒雾-持续中毒',weakness:'antidote'},
  {id:'lion',name:'幻影狂狮',color:'#e67e22',size:26,hp:200,atk:25,speed:2.5,skill:'rage',skillDur:300,skillCD:240,desc:'狂暴-超高伤害',weakness:'armor'},
  {id:'warlock',name:'混沌蛊师',color:'#9b59b6',size:22,hp:150,atk:10,speed:1.5,skill:'confuse',skillDur:360,skillCD:300,desc:'幻术-操作反向',weakness:'clarity'},
  {id:'abyss',name:'深渊领主',color:'#2c3e50',size:32,hp:300,atk:18,speed:1.0,skill:'multi',skillDur:240,skillCD:180,desc:'三阶段-越低血越强',weakness:'smoke'}
];

const MOB_TYPES=[
  {id:'bat',name:'暗蝠',color:'#5b2c6f',size:10,hp:25,atk:5,speed:2.2,ai:'chase',drop:3},
  {id:'skeleton',name:'骷髅兵',color:'#d5d8dc',size:12,hp:40,atk:8,speed:1.2,ai:'patrol',drop:5,shoots:true,shootCD:1200},
  {id:'slime',name:'酸液史莱姆',color:'#27ae60',size:11,hp:30,atk:4,speed:1.0,ai:'wander',drop:4,poison:true},
  {id:'ghost',name:'幽魂',color:'#85c1e9',size:10,hp:20,atk:6,speed:1.8,ai:'phase',drop:6,phase:true},
  {id:'mushroom',name:'毒蘑菇',color:'#e74c3c',size:9,hp:15,atk:3,speed:0.5,ai:'static',drop:2,spawnsSpores:true}
];

const DIALOGS=[
  {speaker:'张小龙',text:'这里好黑...小心脚下的陷阱。'},
  {speaker:'徐凝柔',text:'我听到了什么声音，我们不是一个人。'},
  {speaker:'张小龙',text:'前面有光！也许是出口...也许是陷阱。'},
  {speaker:'徐凝柔',text:'这些怪物...它们守着什么东西。'},
  {speaker:'张小龙',text:'快！追杀者随时可能追上来！'},
  {speaker:'徐凝柔',text:'那个宝箱...我感到里面有力量。'},
  {speaker:'???',text:'你们逃不掉的...深渊在等着你们。'},
  {speaker:'张小龙',text:'坚持住，我一定能带你出去！'}
];

// ============ 全局状态 ============
let canvas,ctx,mmCanvas,mmCtx;
let state='title';
let curLevel=0;
let map=null;
let explored=null;
let player=null;
let bosses=[];
let mobs=[];
let chests=[];
let portals=[];
let particles=[];
let projectiles=[];
let coins=[];
let dmgNums=[];
let shop=null;
let camera={x:0,y:0};
let gameTime=0;
let charIdx=0;
let keys={};
let joyDir={x:0,y:0};
let joyActive=false;
let isMobile=false;
let chestOpen=null;
let animFrame=0;
let stats={kills:0,chests:0,gold:0,dashCount:0};
let dialogTimer=0;
let comboCount=0;
let comboTimer=0;
let screenShake=0;
let tipTimer=0;
let tipText='';

// ============ 初始化 ============
window.onload=function(){
  canvas=document.getElementById('gameCanvas');
  ctx=canvas.getContext('2d');
  mmCanvas=document.getElementById('minimap');
  mmCtx=mmCanvas.getContext('2d');
  resize();
  window.addEventListener('resize',resize);
  isMobile='ontouchstart' in window||navigator.maxTouchPoints>0;
  if(isMobile){
    document.getElementById('joyArea').style.display='block';
    document.getElementById('mobBtns').style.display='flex';
    document.getElementById('minimap').style.display='none';
    initJoystick();
  }
  window.addEventListener('keydown',e=>{
    keys[e.key.toLowerCase()]=true;
    if([' ','arrowup','arrowdown','arrowleft','arrowright','shift'].includes(e.key.toLowerCase()))e.preventDefault();
  });
  window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});
  if(screen.orientation&&screen.orientation.lock){screen.orientation.lock('landscape').catch(()=>{})}
  drawCharPreviews();
  requestAnimationFrame(loop);
};

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}

// ============ 角色预览 ============
function drawCharPreviews(){
  for(let i=0;i<2;i++){
    const c=document.getElementById('charPreview'+i);
    if(!c) continue;
    const cx=c.getContext('2d');
    cx.clearRect(0,0,48,64);
    drawCharacter(cx,24,48,i,0,0,false,null,null);
  }
}

// ============ 精心绘制角色 ============
function drawCharacter(cx,x,y,charIdx,facing,walkAnim,hasWeapon,weapon,armor){
  const bobY=Math.sin(walkAnim*Math.PI/2)*1.5;
  const isMale=charIdx===0;
  
  cx.save();
  cx.translate(x,y+bobY);
  
  // 阴影
  cx.fillStyle='rgba(0,0,0,.25)';
  cx.beginPath();cx.ellipse(0,10,9,4,0,0,Math.PI*2);cx.fill();
  
  // 腿（走路动画）
  const legOff=Math.sin(walkAnim*Math.PI/2)*3;
  cx.fillStyle=isMale?'#2c3e50':'#4a2828';
  // 左腿
  cx.fillRect(-5,3,4,7+legOff);
  // 右腿
  cx.fillRect(1,3,4,7-legOff);
  // 靴子
  cx.fillStyle=isMale?'#1a252f':'#2c1818';
  cx.fillRect(-6,8+legOff,6,3);
  cx.fillRect(0,8-legOff,6,3);
  
  // 盔甲叠加
  if(armor){
    cx.fillStyle='rgba(149,165,166,.5)';
    cx.fillRect(-7,-9,14,14);
    cx.strokeStyle='#bdc3c7';
    cx.lineWidth=1;
    cx.strokeRect(-7,-9,14,14);
  }
  
  // 身体
  const bodyColor=isMale?'#2980b9':'#c0392b';
  cx.fillStyle=bodyColor;
  cx.beginPath();
  cx.roundRect(-6,-9,12,14,2);
  cx.fill();
  // 衣领
  cx.fillStyle=isMale?'#1a5276':'#922b21';
  cx.fillRect(-4,-9,8,3);
  // 腰带
  cx.fillStyle=isMale?'#7f6c2a':'#5b3a1a';
  cx.fillRect(-6,1,12,2);
  // 腰带扣
  cx.fillStyle='#f1c40f';
  cx.fillRect(-1,1,2,2);
  
  // 手臂
  cx.fillStyle=isMale?'#f5c6a0':'#f0d0b0';
  // 后手
  cx.fillRect(-9,-6,3,8);
  // 前手（拿武器的手）
  const armAngle=facing;
  cx.save();
  cx.translate(6,-4);
  cx.rotate(armAngle*0.3);
  cx.fillRect(-1,0,3,8);
  cx.restore();
  
  // 武器
  if(hasWeapon&&weapon){
    cx.save();
    cx.translate(7,-2);
    cx.rotate(facing*0.3);
    if(weapon.id==='sword'){
      cx.fillStyle='#c0c0c0';cx.fillRect(0,-1,16,3);
      cx.fillStyle='#8B4513';cx.fillRect(-3,-2,4,5);
      // 剑尖
      cx.beginPath();cx.moveTo(16,-1);cx.lineTo(20,0);cx.lineTo(16,2);cx.fillStyle='#d0d0d0';cx.fill();
    } else if(weapon.id==='crossbow'){
      cx.fillStyle='#5d4037';cx.fillRect(-2,-3,8,6);
      cx.fillStyle='#8B4513';cx.fillRect(6,-1,10,2);
      // 弦
      cx.strokeStyle='#bbb';cx.lineWidth=1;
      cx.beginPath();cx.moveTo(-2,-3);cx.lineTo(-2,3);cx.stroke();
    } else if(weapon.id==='dagger'){
      cx.fillStyle='#aaffaa';cx.fillRect(0,-1,10,2);
      cx.fillStyle='#5d4037';cx.fillRect(-2,-2,3,4);
    }
    cx.restore();
  }
  
  // 头
  const skinColor=isMale?'#f5c6a0':'#f0d0b0';
  cx.fillStyle=skinColor;
  cx.beginPath();cx.arc(0,-14,8,0,Math.PI*2);cx.fill();
  
  // 头发
  if(isMale){
    // 张小龙 - 短发
    cx.fillStyle='#2c3e50';
    cx.beginPath();cx.arc(0,-17,7,Math.PI,0);cx.fill();
    cx.fillRect(-7,-17,14,3);
    // 刘海
    cx.fillRect(-5,-17,3,4);
    cx.fillRect(2,-17,3,3);
  } else {
    // 徐凝柔 - 长发
    cx.fillStyle='#4a2828';
    cx.beginPath();cx.arc(0,-17,7,Math.PI,0);cx.fill();
    cx.fillRect(-7,-17,14,3);
    // 长发垂下
    cx.fillRect(-8,-14,3,14);
    cx.fillRect(5,-14,3,14);
  }
  
  // 眼睛
  const eyeX=Math.cos(facing)*1.5;
  cx.fillStyle='#fff';
  cx.beginPath();cx.arc(-3+eyeX,-14,2.5,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(3+eyeX,-14,2.5,0,Math.PI*2);cx.fill();
  cx.fillStyle=isMale?'#2c3e50':'#6d4c30';
  cx.beginPath();cx.arc(-3+eyeX*1.2,-14,1.5,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(3+eyeX*1.2,-14,1.5,0,Math.PI*2);cx.fill();
  // 高光
  cx.fillStyle='#fff';
  cx.beginPath();cx.arc(-2+eyeX,-15,0.7,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(4+eyeX,-15,0.7,0,Math.PI*2);cx.fill();
  
  // 嘴
  cx.fillStyle=isMale?'#c0392b':'#e74c3c';
  cx.fillRect(-1+eyeX*.5,-10,2,1);
  
  // 腮红（徐凝柔）
  if(!isMale){
    cx.fillStyle='rgba(231,76,60,.15)';
    cx.beginPath();cx.arc(-5,-12,2,0,Math.PI*2);cx.fill();
    cx.beginPath();cx.arc(5,-12,2,0,Math.PI*2);cx.fill();
  }
  
  cx.restore();
}

// ============ 界面 ============
function showCharSelect(){
  document.getElementById('titleScreen').classList.remove('active');
  document.getElementById('charScreen').classList.add('active');
  state='charSelect';
}
function showHow(){
  const b=document.getElementById('howBox');
  b.style.display=b.style.display==='none'?'block':'none';
}
function pickChar(i,el){
  charIdx=i;
  document.querySelectorAll('.char-card').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}

function startGame(){
  curLevel=0;
  stats={kills:0,chests:0,gold:0,dashCount:0};
  document.getElementById('charScreen').classList.remove('active');
  document.getElementById('hud').style.display='block';
  document.getElementById('invBar').style.display='flex';
  if(!isMobile) document.getElementById('minimap').style.display='block';
  initLevel();
}

function initLevel(){
  const cfg=LEVELS[curLevel];
  showLevelTrans(cfg.name, `第${curLevel+1}关 · ${cfg.rooms}间房间 · ${cfg.bosses}个Boss`);

  setTimeout(()=>{
    map=generateDungeon(cfg);
    explored=Array(map.h).fill(null).map(()=>Array(map.w).fill(false));

    const startRoom=map.rooms[0];
    if(!player){
      player={
        name:charIdx===0?'张小龙':'徐凝柔',
        charIdx:charIdx,
        x:startRoom.cx*T+T/2, y:startRoom.cy*T+T/2,
        hp:charIdx===0?120:100, maxHp:charIdx===0?120:100,
        speed:charIdx===0?3.0:2.7, baseSpeed:charIdx===0?3.0:2.7,
        atk:charIdx===0?12:10, baseAtk:charIdx===0?12:10,
        weapon:null, armor:null, shield:null, phoenix:null, rope:null,
        inventory:[],
        effects:[],
        facing:0,
        attackCD:0, hurtCD:0, dashCD:0, dashTimer:0,
        walkAnim:0, walkTimer:0,
        alive:true,
        baseVis:cfg.vis+(charIdx===1?1:0),
        vis:cfg.vis+(charIdx===1?1:0),
        gold:0,
        magnetRange:60,
        regenTimer:0
      };
    } else {
      player.x=startRoom.cx*T+T/2;
      player.y=startRoom.cy*T+T/2;
      player.baseVis=cfg.vis+(charIdx===1?1:0);
      player.vis=player.baseVis;
      player.effects=[];
    }

    // Bosses
    bosses=[];
    const usedRooms=new Set([0]);
    for(let i=0;i<cfg.bosses;i++){
      let ri;
      do{ri=rand(2,map.rooms.length-1)}while(usedRooms.has(ri));
      usedRooms.add(ri);
      const bi=i%BOSS_TYPES.length;
      const bt=BOSS_TYPES[bi];
      const room=map.rooms[ri];
      bosses.push({
        ...bt,
        x:room.cx*T+T/2, y:room.cy*T+T/2,
        curHp:bt.hp, maxHp:bt.hp,
        room:room, alive:true,
        skillTimer:0, skillActive:false, skillDurLeft:0,
        phase:0, blindTimer:0, attackCD:0,
        patrol:{x:room.cx*T+T/2,y:room.cy*T+T/2,angle:rand(0,360)*Math.PI/180}
      });
    }

    // 小怪
    mobs=[];
    for(let i=0;i<cfg.mobCount;i++){
      let ri;
      do{ri=rand(1,map.rooms.length-1)}while(usedRooms.has(ri)||ri===map.rooms.length-1);
      const room=map.rooms[ri];
      const mt=MOB_TYPES[rand(0,MOB_TYPES.length-1)];
      mobs.push({
        ...mt,
        x:room.cx*T+T/2+randf(-room.w*T/4,room.w*T/4),
        y:room.cy*T+T/2+randf(-room.h*T/4,room.h*T/4),
        curHp:mt.hp, maxHp:mt.hp,
        alive:true, attackCD:0,
        homeX:room.cx*T+T/2, homeY:room.cy*T+T/2,
        wanderAngle:Math.random()*Math.PI*2,
        shootCD:mt.shoots?mt.shootCD:99999,
        sporeCD:mt.spawnsSpores?2000:99999
      });
    }

    // 箱子（数量=房间数+2，保证充足）
    chests=[];
    const chestRoomIndices=[...Array(map.rooms.length).keys()].filter(i=>!usedRooms.has(i)&&i!==0&&i!==map.rooms.length-1);
    for(let i=0;i<Math.min(chestRoomIndices.length,cfg.rooms+2);i++){
      const ri=chestRoomIndices[i%chestRoomIndices.length];
      const room=map.rooms[ri];
      chests.push({
        x:room.cx*T+T/2+randf(-room.w*T/4,room.w*T/4),
        y:room.cy*T+T/2+randf(-room.h*T/4,room.h*T/4),
        opened:false
      });
    }

    // 商店（概率出现）
    shop=null;
    if(Math.random()<cfg.shopChance&&chestRoomIndices.length>2){
      const ri=chestRoomIndices[rand(0,chestRoomIndices.length-1)];
      const room=map.rooms[ri];
      shop={
        x:room.cx*T+T/2,
        y:room.cy*T+T/2+T,
        items:generateShopItems()
      };
    }

    // 传送阵
    portals=[];
    for(const b of bosses){
      portals.push({x:b.x,y:b.y,active:false,bossRef:b});
    }
    const exitRoom=map.rooms[map.rooms.length-1];
    portals.push({x:exitRoom.cx*T+T/2,y:exitRoom.cy*T+T/2,active:true,isExit:true});

    // 金币散落
    coins=[];
    for(let i=0;i<cfg.rooms*3;i++){
      const ri=rand(0,map.rooms.length-1);
      const room=map.rooms[ri];
      coins.push({
        x:room.cx*T+T/2+randf(-room.w*T/3,room.w*T/3),
        y:room.cy*T+T/2+randf(-room.h*T/3,room.h*T/3),
        value:rand(1,3),
        collected:false
      });
    }

    gameTime=cfg.time;
    particles=[];
    projectiles=[];
    dmgNums=[];
    state='playing';
    comboCount=0;
    comboTimer=0;

    revealAround(player.x,player.y,player.vis*T);
    showTip('按 E 开箱 | Shift 闪避 | 空格 攻击');
  },2500);
}

// ============ 地牢生成 ============
function generateDungeon(cfg){
  const w=cfg.w, h=cfg.h;
  const grid=Array(h).fill(null).map(()=>Array(w).fill(1));
  const rooms=[];

  for(let attempt=0;attempt<cfg.rooms*5&&rooms.length<cfg.rooms;attempt++){
    const rw=rand(5,9), rh=rand(4,7);
    const rx=rand(2,w-rw-2), ry=rand(2,h-rh-2);
    let ok=true;
    for(const r of rooms){
      if(rx<r.x+r.w+2&&rx+rw+2>r.x&&ry<r.y+r.h+2&&ry+rh+2>r.y){ok=false;break}
    }
    if(!ok) continue;
    for(let y=ry;y<ry+rh;y++) for(let x=rx;x<rx+rw;x++) grid[y][x]=0;
    rooms.push({x:rx,y:ry,w:rw,h:rh,cx:rx+Math.floor(rw/2),cy:ry+Math.floor(rh/2)});
  }

  // 走廊连接
  for(let i=1;i<rooms.length;i++){
    const a=rooms[i-1],b=rooms[i];
    let cx=a.cx,cy=a.cy;
    while(cx!==b.cx){if(cy>=0&&cy<h&&cx>=0&&cx<w)grid[cy][cx]=0;cx+=cx<b.cx?1:-1}
    while(cy!==b.cy){if(cy>=0&&cy<h&&cx>=0&&cx<w)grid[cy][cx]=0;cy+=cy<b.cy?1:-1}
    grid[cy][cx]=0;
  }

  // 额外连接
  for(let i=0;i<2;i++){
    if(rooms.length<4) break;
    const a=rooms[rand(0,rooms.length-1)];
    const b=rooms[rand(0,rooms.length-1)];
    if(a===b) continue;
    let cx=a.cx,cy=a.cy;
    while(cx!==b.cx){if(cy>=0&&cy<h&&cx>=0&&cx<w)grid[cy][cx]=0;cx+=cx<b.cx?1:-1}
    while(cy!==b.cy){if(cy>=0&&cy<h&&cx>=0&&cx<w)grid[cy][cx]=0;cy+=cy<b.cy?1:-1}
  }

  // 装饰
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    if(grid[y][x]===0&&Math.random()<.12) grid[y][x]=2;
  }

  return{grid,rooms,w,h};
}

// ============ 商店 ============
function generateShopItems(){
  const items=[];
  const pool=ITEMS.filter(i=>i.rarity>=.05);
  for(let i=0;i<3;i++){
    const it=pool[rand(0,pool.length-1)];
    items.push({...it,cost:Math.ceil(it.rarity*100)+rand(5,15)});
  }
  return items;
}

// ============ 迷雾 ============
function revealAround(px,py,r){
  const cr=Math.ceil(r/T)+1;
  const cx=Math.floor(px/T), cy=Math.floor(py/T);
  for(let dy=-cr;dy<=cr;dy++) for(let dx=-cr;dx<=cr;dx++){
    const tx=cx+dx, ty=cy+dy;
    if(tx<0||ty<0||tx>=map.w||ty>=map.h) continue;
    if(Math.hypot(dx,dy)*T<=r) explored[ty][tx]=true;
  }
}

function getVis(){
  let v=player.baseVis;
  for(const e of player.effects){
    if(e.eff==='orb') v*=3;
    if(e.eff==='torch') v+=2;
  }
  return v;
}

// ============ 游戏循环 ============
let lastTime=0;
function loop(ts){
  const dt=Math.min(ts-lastTime,50);
  lastTime=ts;
  animFrame++;
  if(state==='playing'){
    update(dt);
    render();
    updateHUD();
  }
  requestAnimationFrame(loop);
}

function update(dt){
  if(!player.alive) return;

  // 计时
  gameTime-=dt/1000;
  if(gameTime<=0){playerDie('时间耗尽，追杀者追上了你');return}

  // 玩家输入
  let dx=0,dy=0;
  if(keys['w']||keys['arrowup']) dy=-1;
  if(keys['s']||keys['arrowdown']) dy=1;
  if(keys['a']||keys['arrowleft']) dx=-1;
  if(keys['d']||keys['arrowright']) dx=1;
  if(joyActive){dx=joyDir.x;dy=joyDir.y}

  const confused=player.effects.some(e=>e.eff==='confuse');
  if(confused){dx=-dx;dy=-dy}

  const speed=player.speed*(player.effects.some(e=>e.eff==='adrenaline')?1.8:1)*(player.effects.some(e=>e.eff==='slow')?.5:1);
  
  // 闪避中方向
  let moveX=dx, moveY=dy;
  if(player.dashTimer>0){
    moveX=Math.cos(player.facing);
    moveY=Math.sin(player.facing);
  }
  
  if(moveX!==0||moveY!==0||player.dashTimer>0){
    const len=Math.hypot(moveX,moveY)||1;
    const mx=moveX/len*speed*(player.dashTimer>0?3:1);
    const my=moveY/len*speed*(player.dashTimer>0?3:1);
    const nx=player.x+mx, ny=player.y+my;
    if(player.dashTimer>0){
      // 闪避穿墙/穿怪
      player.x=nx; player.y=ny;
    } else {
      if(!isWall(nx,player.y)) player.x=nx;
      if(!isWall(player.x,ny)) player.y=ny;
    }
    if(dx!==0||dy!==0) player.facing=Math.atan2(dy,dx);
    player.walkTimer+=dt;
    if(player.walkTimer>100){player.walkTimer=0;player.walkAnim=(player.walkAnim+1)%4}
  } else {
    player.walkAnim=0;
  }

  // 冷却
  if(player.attackCD>0) player.attackCD-=dt;
  if(player.hurtCD>0) player.hurtCD-=dt;
  if(player.dashCD>0) player.dashCD-=dt;
  if(player.dashTimer>0) player.dashTimer-=dt;
  if(screenShake>0) screenShake-=dt;
  if(tipTimer>0) tipTimer-=dt;

  // 闪避
  if((keys['shift']||keys['q'])){keys['shift']=false;keys['q']=false;doDash()}

  // 空格攻击
  if(keys[' ']||keys['z']){keys[' ']=false;keys['z']=false;doAttack()}

  // E交互
  if(keys['e']){keys['e']=false;doInteract()}

  // F传送
  if(keys['f']){keys['f']=false;doTeleport()}

  // 1-5道具
  for(let i=1;i<=5;i++){
    if(keys[String(i)]){keys[String(i)]=false;useItem(i-1)}
  }

  // 效果计时
  for(let i=player.effects.length-1;i>=0;i--){
    player.effects[i].dur-=dt;
    if(player.effects[i].dur<=0) player.effects.splice(i,1);
  }

  // 徐凝柔被动回复
  if(charIdx===1){
    player.regenTimer+=dt;
    if(player.regenTimer>=3000){player.regenTimer=0;player.hp=Math.min(player.maxHp,player.hp+2)}
  }

  // 金币吸引
  const magRange=player.effects.some(e=>e.eff==='magnet')?180:60;
  for(const c of coins){
    if(c.collected) continue;
    const d=Math.hypot(c.x-player.x,c.y-player.y);
    if(d<magRange){
      const ang=Math.atan2(player.y-c.y,player.x-c.x);
      c.x+=Math.cos(ang)*4;
      c.y+=Math.sin(ang)*4;
    }
    if(d<18){
      c.collected=true;
      player.gold+=c.value;
      stats.gold+=c.value;
      spawnParticles(c.x,c.y,'#ffd700',3);
    }
  }

  // Boss更新
  for(const b of bosses){
    if(!b.alive) continue;
    updateBoss(b,dt);
  }

  // 小怪更新
  for(const m of mobs){
    if(!m.alive) continue;
    updateMob(m,dt);
  }

  // 弹道更新
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.x+=p.vx*dt/16; p.y+=p.vy*dt/16;
    p.life-=dt;
    if(p.from==='boss'&&Math.hypot(p.x-player.x,p.y-player.y)<16){
      if(player.dashTimer<=0) hurtPlayer(p.dmg);
      projectiles.splice(i,1);continue;
    }
    if(p.from==='mob'&&Math.hypot(p.x-player.x,p.y-player.y)<14){
      if(player.dashTimer<=0) hurtPlayer(p.dmg);
      projectiles.splice(i,1);continue;
    }
    if(p.from==='player'){
      for(const b of bosses){
        if(!b.alive) continue;
        if(Math.hypot(p.x-b.x,p.y-b.y)<b.size/2+4){
          let dmg=p.dmg;
          if(player.weapon&&b.weakness===player.weapon.id) dmg=Math.floor(dmg*2.2);
          b.curHp-=dmg;
          spawnParticles(b.x,b.y,'#ff6b35',5);
          addDmgNum(b.x,b.y,dmg);
          if(b.curHp<=0) bossDie(b);
          projectiles.splice(i,1);break;
        }
      }
      for(const m of mobs){
        if(!m.alive) continue;
        if(Math.hypot(p.x-m.x,p.y-m.y)<m.size+4){
          m.curHp-=p.dmg;
          spawnParticles(m.x,m.y,'#ff6b35',3);
          addDmgNum(m.x,m.y,p.dmg);
          if(m.curHp<=0) mobDie(m);
          projectiles.splice(i,1);break;
        }
      }
      continue;
    }
    if(isWall(p.x,p.y)||p.life<=0){projectiles.splice(i,1)}
  }

  // 粒子
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.life-=dt;
    p.vy+=.04;
    if(p.life<=0) particles.splice(i,1);
  }

  // 伤害数字
  for(let i=dmgNums.length-1;i>=0;i--){
    dmgNums[i].y-=.8;
    dmgNums[i].life-=dt;
    if(dmgNums[i].life<=0) dmgNums.splice(i,1);
  }

  // 连击计时
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0)comboCount=0}

  // 迷雾揭示
  player.vis=getVis();
  player.magnetRange=player.effects.some(e=>e.eff==='magnet')?180:60;
  revealAround(player.x,player.y,player.vis*T);

  // 偶尔弹剧情对话
  if(animFrame%1800===0&&Math.random()<.3){
    const d=DIALOGS[rand(0,DIALOGS.length-1)];
    showDialog(d.speaker,d.text);
  }
}

// ============ 碰撞 ============
function isWall(x,y){
  const tx=Math.floor(x/T), ty=Math.floor(y/T);
  if(tx<0||ty<0||tx>=map.w||ty>=map.h) return true;
  return map.grid[ty][tx]===1;
}

// ============ 闪避 ============
function doDash(){
  if(player.dashCD>0||player.dashTimer>0) return;
  player.dashTimer=250;
  player.dashCD=2500;
  player.hurtCD=300;
  stats.dashCount++;
  spawnParticles(player.x,player.y,'rgba(0,188,212,.5)',5);
}

// ============ 战斗 ============
function doAttack(){
  if(player.attackCD>0) return;
  player.attackCD=250;
  const atk=player.baseAtk+(player.weapon?player.weapon.atk:0);
  const range=player.weapon&&player.weapon.ranged?150:42;

  if(player.weapon&&player.weapon.ranged){
    // 远程射击
    const ang=player.facing;
    projectiles.push({
      x:player.x+Math.cos(ang)*12,y:player.y+Math.sin(ang)*12,
      vx:Math.cos(ang)*5,vy:Math.sin(ang)*5,
      dmg:atk,life:1500,from:'player',color:'#f39c12'
    });
    player.weapon.dur--;
    if(player.weapon.dur<=0){player.weapon=null}
  } else {
    // 近战攻击
    for(const b of bosses){
      if(!b.alive) continue;
      const d=Math.hypot(b.x-player.x,b.y-player.y);
      if(d<range){
        let dmg=atk;
        if(player.weapon&&b.weakness===player.weapon.id) dmg=Math.floor(dmg*2.2);
        if(player.weapon&&player.weapon.poison){b.poisoned=true;b.poisonTimer=300}
        b.curHp-=dmg;
        spawnParticles(b.x,b.y,'#ff6b35',6);
        addDmgNum(b.x,b.y,dmg);
        screenShake=100;
        comboCount++;comboTimer=2000;
        if(player.weapon){player.weapon.dur--;if(player.weapon.dur<=0)player.weapon=null}
        if(b.curHp<=0) bossDie(b);
        break;
      }
    }
    for(const m of mobs){
      if(!m.alive) continue;
      const d=Math.hypot(m.x-player.x,m.y-player.y);
      if(d<range){
        let dmg=atk;
        m.curHp-=dmg;
        spawnParticles(m.x,m.y,'#ff6b35',4);
        addDmgNum(m.x,m.y,dmg);
        comboCount++;comboTimer=2000;
        if(m.curHp<=0) mobDie(m);
        break;
      }
    }
  }
  player.attackAnim=8;
}

function hurtPlayer(dmg){
  if(player.hurtCD>0) return;
  let actual=dmg;
  if(player.armor){actual=Math.floor(actual*.5);player.armor.wear-=15;if(player.armor.wear<=0){player.armor=null}}
  if(player.shield&&player.shield.charges>0){player.shield.charges--;if(player.shield.charges<=0)player.shield=null;return}
  player.hp-=actual;
  player.hurtCD=400;
  screenShake=150;
  spawnParticles(player.x,player.y,'#e74c3c',5);
  if(player.hp<=0){
    if(player.phoenix&&player.phoenix.charges>0){player.phoenix.charges--;if(player.phoenix.charges<=0)player.phoenix=null;player.hp=Math.floor(player.maxHp*.5);spawnParticles(player.x,player.y,'#ffd700',15)}
    else{playerDie('你倒在了黑暗中')}
  }
}

function playerDie(msg){
  player.alive=false;
  setTimeout(()=>{
    document.getElementById('endTitle').textContent='💀 游戏结束';
    document.getElementById('endTitle').style.color='#e74c3c';
    document.getElementById('endDesc').textContent=msg||'';
    document.getElementById('endStats').innerHTML=`击杀:${stats.kills} | 开箱:${stats.chests} | 金币:${stats.gold} | 闪避:${stats.dashCount}`;
    document.getElementById('endScreen').style.display='flex';
  },600);
}

function bossDie(b){
  b.alive=false;
  spawnParticles(b.x,b.y,'#ffd700',20);
  screenShake=300;
  for(const p of portals){if(p.bossRef===b) p.active=true}
  // 掉落金币
  for(let i=0;i<8;i++){
    coins.push({x:b.x+randf(-20,20),y:b.y+randf(-20,20),value:rand(3,6),collected:false});
  }
  addDmgNum(b.x,b.y-10,'击败!');
  showTip('传送阵已激活! 按F传送');
}

function mobDie(m){
  m.alive=false;
  stats.kills++;
  spawnParticles(m.x,m.y,m.color,8);
  // 掉金币
  for(let i=0;i<m.drop;i++){
    coins.push({x:m.x+randf(-15,15),y:m.y+randf(-15,15),value:1,collected:false});
  }
  comboCount++;comboTimer=2000;
  // 偶尔掉血球
  if(Math.random()<.2){
    coins.push({x:m.x,y:m.y,value:0,collected:false,isHeal:true,healVal:8});
  }
}

// ============ 小怪AI ============
function updateMob(m,dt){
  const d=Math.hypot(m.x-player.x,m.y-player.y);
  m.attackCD=Math.max(0,m.attackCD-dt);
  m.shootCD=Math.max(0,m.shootCD-dt);
  m.sporeCD=Math.max(0,m.sporeCD-dt);

  if(m.ai==='chase'&&d<T*6){
    const ang=Math.atan2(player.y-m.y,player.x-m.x);
    const nx=m.x+Math.cos(ang)*m.speed;
    const ny=m.y+Math.sin(ang)*m.speed;
    if(!isWall(nx,m.y)) m.x=nx;
    if(!isWall(m.x,ny)) m.y=ny;
    if(d<T*1.2&&m.attackCD<=0){m.attackCD=800;hurtPlayer(m.atk)}
  }
  else if(m.ai==='patrol'){
    m.wanderAngle+=.01;
    const tx=m.homeX+Math.cos(m.wanderAngle)*T*2;
    const ty=m.homeY+Math.sin(m.wanderAngle)*T*2;
    const ang=Math.atan2(ty-m.y,tx-m.x);
    const nx=m.x+Math.cos(ang)*m.speed*.5;
    const ny=m.y+Math.sin(ang)*m.speed*.5;
    if(!isWall(nx,m.y)) m.x=nx;
    if(!isWall(m.x,ny)) m.y=ny;
    if(d<T*5&&m.shoots&&m.shootCD<=0){
      m.shootCD=m.shootCD||1200;
      const a=Math.atan2(player.y-m.y,player.x-m.x);
      projectiles.push({x:m.x,y:m.y,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,dmg:m.atk,life:2000,from:'mob',color:'#aaa'});
    }
  }
  else if(m.ai==='wander'){
    m.wanderAngle+=randf(-.03,.03);
    const nx=m.x+Math.cos(m.wanderAngle)*m.speed*.6;
    const ny=m.y+Math.sin(m.wanderAngle)*m.speed*.6;
    if(!isWall(nx,ny)){m.x=nx;m.y=ny}else{m.wanderAngle+=Math.PI/2}
    if(d<T*1.2&&m.attackCD<=0){
      m.attackCD=1000;
      hurtPlayer(m.atk);
      if(m.poison&&!player.effects.some(e=>e.eff==='poison')){
        player.effects.push({eff:'poison',dur:600});
      }
    }
  }
  else if(m.ai==='phase'){
    // 幽魂可以穿墙
    if(d<T*5){
      const ang=Math.atan2(player.y-m.y,player.x-m.x);
      m.x+=Math.cos(ang)*m.speed;
      m.y+=Math.sin(ang)*m.speed;
    } else {
      m.wanderAngle+=.02;
      m.x+=Math.cos(m.wanderAngle)*m.speed*.3;
      m.y+=Math.sin(m.wanderAngle)*m.speed*.3;
    }
    if(d<T*1.2&&m.attackCD<=0){m.attackCD=900;hurtPlayer(m.atk)}
  }
  else if(m.ai==='static'){
    if(d<T*4&&m.sporeCD<=0){
      m.sporeCD=2000;
      projectiles.push({x:m.x,y:m.y,vx:0,vy:-1.5,dmg:m.atk,life:1500,from:'mob',color:'#27ae60'});
    }
  }
}

// ============ 交互 ============
function doInteract(){
  // 开箱子 - 放最前面优先
  for(const c of chests){
    if(c.opened) continue;
    if(Math.hypot(c.x-player.x,c.y-player.y)<T*2){
      openChest(c);return;
    }
  }
  // 商店
  if(shop&&Math.hypot(shop.x-player.x,shop.y-player.y)<T*2){
    openShop();return;
  }
  // 血球
  for(const c of coins){
    if(c.collected||!c.isHeal) continue;
    if(Math.hypot(c.x-player.x,c.y-player.y)<T*2){
      c.collected=true;
      player.hp=Math.min(player.maxHp,player.hp+c.healVal);
      spawnParticles(c.x,c.y,'#2ecc71',5);
    }
  }
}

function openChest(c){
  c.opened=true;
  stats.chests++;
  const item=pickRandomItem();
  chestOpen=item;
  document.getElementById('chestIcon').textContent=item.icon;
  document.getElementById('chestName').textContent=item.name;
  document.getElementById('chestDesc').textContent=item.desc;
  document.getElementById('chestDlg').style.display='block';
}

function pickRandomItem(){
  const total=ITEMS.reduce((s,i)=>s+i.rarity,0);
  let r=Math.random()*total;
  for(const i of ITEMS){r-=i.rarity;if(r<=0)return{...i}}
  return{...ITEMS[6]};
}

function closeChest(){
  document.getElementById('chestDlg').style.display='none';
  const item=chestOpen;
  if(!item) return;
  if(item.type==='weapon'){player.weapon={...item}}
  else if(item.id==='armor'){player.armor={...item}}
  else if(item.id==='shield'){player.shield={...item}}
  else if(item.id==='phoenix'){player.phoenix={...item}}
  else if(item.id==='rope'){player.rope={...item}}
  else if(item.type==='consume'||item.type==='instant'||item.type==='buff'){
    if(item.type==='instant') useItemEffect(item);
    else if(item.type==='buff') applyBuff(item);
    else if(player.inventory.length<5) player.inventory.push({...item});
    else{player.inventory.shift();player.inventory.push({...item})}
  }
  chestOpen=null;
}

function useItem(idx){
  if(idx>=player.inventory.length) return;
  const item=player.inventory[idx];
  if(item.type==='consume'){useItemEffect(item);player.inventory.splice(idx,1)}
  else if(item.type==='buff'){applyBuff(item);player.inventory.splice(idx,1)}
  else if(item.type==='instant'){useItemEffect(item);player.inventory.splice(idx,1)}
}

function useItemEffect(item){
  if(item.heal){player.hp=Math.min(player.maxHp,player.hp+item.heal);spawnParticles(player.x,player.y,'#2ecc71',8)}
  if(item.curePoison){player.effects=player.effects.filter(e=>e.eff!=='poison')}
  if(item.cureConfuse){player.effects=player.effects.filter(e=>e.eff!=='confuse')}
  if(item.reveal){for(let y=0;y<map.h;y++)for(let x=0;x<map.w;x++){if(Math.random()<item.reveal)explored[y][x]=true}}
  if(item.blind){for(const b of bosses){if(b.alive&&Math.hypot(b.x-player.x,b.y-player.y)<200)b.blindTimer=item.blind}}
  if(item.areaDmg){
    const r=80;
    for(const b of bosses){if(b.alive&&Math.hypot(b.x-player.x,b.y-player.y)<r){b.curHp-=item.areaDmg;addDmgNum(b.x,b.y,item.areaDmg);if(b.curHp<=0)bossDie(b)}}
    for(const m of mobs){if(m.alive&&Math.hypot(m.x-player.x,m.y-player.y)<r){m.curHp-=item.areaDmg;if(m.curHp<=0)mobDie(m)}}
    spawnParticles(player.x,player.y,'#f39c12',15);
    screenShake=200;
  }
}

function applyBuff(item){
  player.effects.push({eff:item.eff||item.id,dur:item.dur||3000});
  spawnParticles(player.x,player.y,'#f1c40f',6);
}

function doTeleport(){
  for(const p of portals){
    const d=Math.hypot(p.x-player.x,p.y-player.y);
    if(d<T*2.5){
      if(p.isExit){
        curLevel++;
        if(curLevel>=LEVELS.length){victory()}else{initLevel()}
        return;
      }
      if(!p.active) continue;
      const maxDist=Math.max(map.w,map.h)*T*.3;
      const ang=player.facing;
      let tx=player.x+Math.cos(ang)*maxDist;
      let ty=player.y+Math.sin(ang)*maxDist;
      tx=clamp(tx,T*2,(map.w-2)*T);
      ty=clamp(ty,T*2,(map.h-2)*T);
      if(!isWall(tx,ty)){player.x=tx;player.y=ty;spawnParticles(player.x,player.y,'#00d4ff',10)}
      else{
        for(let r=0;r<8;r++){
          const a=r*Math.PI/4;
          const nx=player.x+Math.cos(ang)*maxDist+Math.cos(a)*T*2;
          const ny=player.y+Math.sin(ang)*maxDist+Math.sin(a)*T*2;
          if(!isWall(nx,ny)){player.x=nx;player.y=ny;spawnParticles(player.x,player.y,'#00d4ff',10);break}
        }
      }
      return;
    }
  }
}

// ============ 商店 ============
function openShop(){
  const el=document.getElementById('shopItems');
  el.innerHTML='';
  for(let i=0;i<shop.items.length;i++){
    const it=shop.items[i];
    const div=document.createElement('div');
    div.className='shop-item';
    div.innerHTML=`<span class="si-icon">${it.icon}</span><div class="si-info"><div class="si-name">${it.name}</div><div class="si-desc">${it.desc}</div></div><span class="si-cost">💰${it.cost}</span>`;
    div.onclick=(()=>{
      const idx=i;
      return()=>{
        const item=shop.items[idx];
        if(player.gold>=item.cost){
          player.gold-=item.cost;
          if(item.type==='weapon'){player.weapon={...item}}
          else if(item.id==='armor'){player.armor={...item}}
          else if(item.id==='shield'){player.shield={...item}}
          else if(player.inventory.length<5){player.inventory.push({...item})}
          else{player.inventory.shift();player.inventory.push({...item})}
          shop.items.splice(idx,1);
          openShop();
        } else {
          showTip('金币不足!');
        }
      };
    })();
    el.appendChild(div);
  }
  document.getElementById('shopDlg').style.display='block';
}

// ============ 伤害数字 ============
function addDmgNum(x,y,val){
  dmgNums.push({x:x+randf(-8,8),y:y-10,val:val,life:800,maxLife:800,color:typeof val==='number'?'#ff6b35':'#ffd700'});
}

// ============ Boss AI ============
function updateBoss(b,dt){
  if(b.blindTimer>0){b.blindTimer-=dt;return}
  const d=Math.hypot(b.x-player.x,b.y-player.y);

  if(d<T*6){
    const ang=Math.atan2(player.y-b.y,player.x-b.x);
    const sp=b.speed*(b.skillActive&&b.id==='lion'?2:1);
    const nx=b.x+Math.cos(ang)*sp;
    const ny=b.y+Math.sin(ang)*sp;
    if(!isWall(nx,b.y)) b.x=nx;
    if(!isWall(b.x,ny)) b.y=ny;
    if(d<T*1.5&&b.attackCD<=0){
      b.attackCD=800;
      let dmg=b.atk;
      if(b.skillActive&&b.id==='lion') dmg=Math.floor(dmg*2.5);
      hurtPlayer(dmg);
    }
    b.skillTimer-=dt;
    if(b.skillTimer<=0&&d<T*5){
      b.skillTimer=b.skillCD;
      activateBossSkill(b);
    }
  } else {
    b.patrol.angle+=.005;
    const px=b.room.cx*T+T/2+Math.cos(b.patrol.angle)*T*2;
    const py=b.room.cy*T+T/2+Math.sin(b.patrol.angle)*T*2;
    const ang=Math.atan2(py-b.y,px-b.x);
    const nx=b.x+Math.cos(ang)*b.speed*.5;
    const ny=b.y+Math.sin(ang)*b.speed*.5;
    if(!isWall(nx,b.y)) b.x=nx;
    if(!isWall(b.x,ny)) b.y=ny;
  }

  if(b.attackCD>0) b.attackCD-=dt;
  if(b.skillActive){b.skillDurLeft-=dt;if(b.skillDurLeft<=0)b.skillActive=false}
  if(b.poisoned){b.poisonTimer-=dt;if(animFrame%30===0)b.curHp-=3;if(b.poisonTimer<=0)b.poisoned=false}
  if(b.id==='abyss'){
    const hpPct=b.curHp/b.maxHp;
    if(hpPct<.66&&b.phase<1){b.phase=1;b.speed*=1.3;b.atk=Math.floor(b.atk*1.2)}
    if(hpPct<.33&&b.phase<2){b.phase=2;b.speed*=1.3;b.atk=Math.floor(b.atk*1.3);b.size+=4}
  }
}

function activateBossSkill(b){
  switch(b.id){
    case 'golem':
      if(!player.effects.some(e=>e.eff==='slow')){player.effects.push({eff:'slow',dur:b.skillDur});spawnParticles(player.x,player.y,'#3498db',8)}
      break;
    case 'spider':
      if(!player.effects.some(e=>e.eff==='poison')){player.effects.push({eff:'poison',dur:b.skillDur})}
      const ang=Math.atan2(player.y-b.y,player.x-b.x);
      projectiles.push({x:b.x,y:b.y,vx:Math.cos(ang)*3,vy:Math.sin(ang)*3,dmg:b.atk,life:2000,from:'boss',color:'#27ae60'});
      break;
    case 'lion':
      b.skillActive=true;b.skillDurLeft=b.skillDur;
      break;
    case 'warlock':
      if(!player.effects.some(e=>e.eff==='confuse')){player.effects.push({eff:'confuse',dur:b.skillDur});spawnParticles(player.x,player.y,'#9b59b6',10)}
      for(let i=0;i<3;i++){
        const a=Math.atan2(player.y-b.y,player.x-b.x)+(i-1)*.3;
        projectiles.push({x:b.x,y:b.y,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2.5,dmg:b.atk,life:2500,from:'boss',color:'#9b59b6'});
      }
      break;
    case 'abyss':
      for(let i=0;i<5;i++){
        const a=Math.atan2(player.y-b.y,player.x-b.x)+i*Math.PI*.4;
        projectiles.push({x:b.x,y:b.y,vx:Math.cos(a)*2,vy:Math.sin(a)*2,dmg:b.atk,life:3000,from:'boss',color:'#2c3e50'});
      }
      break;
  }
}

// ============ 粒子 ============
function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    particles.push({x,y,vx:randf(-2,2),vy:randf(-3,0),life:rand(300,700),maxLife:700,color,size:rand(2,5)});
  }
}

// ============ 渲染 ============
function render(){
  const W=canvas.width, H=canvas.height;
  ctx.fillStyle='#0a0510';
  ctx.fillRect(0,0,W,H);
  if(!map||!player) return;

  // 屏幕震动
  let shakeX=0, shakeY=0;
  if(screenShake>0){
    shakeX=randf(-3,3)*screenShake/300;
    shakeY=randf(-3,3)*screenShake/300;
  }

  camera.x=player.x-W/2+shakeX;
  camera.y=player.y-H/2+shakeY;

  const startC=Math.floor(camera.x/T)-1;
  const startR=Math.floor(camera.y/T)-1;
  const endC=startC+Math.ceil(W/T)+2;
  const endR=startR+Math.ceil(H/T)+2;

  const vis=getVis();
  const visPx=vis*T;

  // 地图
  for(let r=startR;r<=endR;r++){
    for(let c=startC;c<=endC;c++){
      if(r<0||c<0||r>=map.h||c>=map.w) continue;
      const d=Math.hypot(c*T+T/2-player.x,r*T+T/2-player.y);
      if(d>visPx+T&&!explored[r][c]) continue;
      if(d>visPx+T*3) continue;

      const sx=c*T-camera.x, sy=r*T-camera.y;
      const tile=map.grid[r][c];
      const alpha=d<=visPx?1:explored[r][c]?.25:0;
      if(alpha<=0) continue;
      ctx.globalAlpha=alpha;

      if(tile===1){
        ctx.fillStyle='#2a1a3a';ctx.fillRect(sx,sy,T,T);
        ctx.fillStyle='#3a2a4a';ctx.fillRect(sx+1,sy+1,T-2,T-2);
        ctx.fillStyle='#221432';
        ctx.fillRect(sx+T/2-1,sy,2,T);
        ctx.fillRect(sx,sy+T/2-1,T,2);
        // 墙顶高光
        ctx.fillStyle='rgba(255,255,255,.02)';
        ctx.fillRect(sx+1,sy+1,T-2,3);
      } else {
        ctx.fillStyle=tile===2?'#18101e':'#141020';
        ctx.fillRect(sx,sy,T,T);
        if((c+r)%2===0){ctx.fillStyle='rgba(255,255,255,.012)';ctx.fillRect(sx,sy,T,T)}
        if(tile===2){ctx.fillStyle='#1e1428';ctx.fillRect(sx+8,sy+10,6,4)}
        // 偶尔裂缝
        if((c*7+r*13)%23===0){
          ctx.strokeStyle='rgba(255,255,255,.03)';ctx.lineWidth=1;
          ctx.beginPath();ctx.moveTo(sx+4,sy+T/2);ctx.lineTo(sx+T-4,sy+T/2+4);ctx.stroke();
        }
      }
      ctx.globalAlpha=1;
    }
  }

  // 金币
  for(const c of coins){
    if(c.collected) continue;
    const d=Math.hypot(c.x-player.x,c.y-player.y);
    if(d>visPx) continue;
    const sx=c.x-camera.x, sy=c.y-camera.y;
    if(c.isHeal){
      // 血球
      ctx.fillStyle='#e74c3c';
      ctx.beginPath();ctx.arc(sx,sy,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='7px monospace';ctx.textAlign='center';
      ctx.fillText('+',sx,sy+3);
    } else {
      ctx.fillStyle='#ffd700';
      ctx.beginPath();ctx.arc(sx,sy,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffaa00';
      ctx.beginPath();ctx.arc(sx,sy,2,0,Math.PI*2);ctx.fill();
    }
  }

  // 传送阵
  for(const p of portals){
    const d=Math.hypot(p.x-player.x,p.y-player.y);
    if(d>visPx+T) continue;
    const sx=p.x-camera.x, sy=p.y-camera.y;
    const alpha=d<=visPx?1:.3;
    ctx.globalAlpha=alpha;
    if(p.isExit){
      ctx.fillStyle='#ffd700';
      ctx.beginPath();ctx.arc(sx,sy,14,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#ffaa00';ctx.lineWidth=2;ctx.stroke();
      // 箭头动画
      const rot=animFrame*.04;
      ctx.fillStyle='#fff';
      ctx.font='10px monospace';ctx.textAlign='center';
      ctx.fillText('出口',sx,sy+4);
      // 旋转光点
      for(let i=0;i<6;i++){
        const a=rot+i*Math.PI/3;
        ctx.fillStyle='rgba(255,215,0,.6)';
        ctx.beginPath();ctx.arc(sx+Math.cos(a)*18,sy+Math.sin(a)*18,2,0,Math.PI*2);ctx.fill();
      }
    } else {
      ctx.fillStyle=p.active?'#00d4ff':'#333';
      ctx.beginPath();ctx.arc(sx,sy,12,0,Math.PI*2);ctx.fill();
      if(p.active){
        ctx.strokeStyle='#0088ff';ctx.lineWidth=2;ctx.stroke();
        const rot=animFrame*.03;
        for(let i=0;i<4;i++){
          const a=rot+i*Math.PI/2;
          ctx.fillStyle='#00d4ff';
          ctx.fillRect(sx+Math.cos(a)*8-2,sy+Math.sin(a)*8-2,4,4);
        }
      }
    }
    ctx.globalAlpha=1;
  }

  // 箱子
  for(const c of chests){
    const d=Math.hypot(c.x-player.x,c.y-player.y);
    if(d>visPx) continue;
    const sx=c.x-camera.x, sy=c.y-camera.y;
    if(c.opened){
      ctx.fillStyle='#3a2a1a';ctx.fillRect(sx-8,sy-5,16,10);
      ctx.fillStyle='#2a1a0a';ctx.fillRect(sx-8,sy-5,16,2);
    } else {
      // 闭合宝箱 - 更精致
      ctx.fillStyle='#8B4513';ctx.fillRect(sx-10,sy-8,20,16);
      // 箱盖
      ctx.fillStyle='#A0522D';ctx.fillRect(sx-10,sy-8,20,6);
      // 金属条
      ctx.fillStyle='#DAA520';
      ctx.fillRect(sx-10,sy-2,20,2);
      // 锁
      ctx.fillStyle='#FFD700';
      ctx.fillRect(sx-3,sy-4,6,5);
      ctx.fillStyle='#B8860B';
      ctx.fillRect(sx-1,sy-3,2,3);
      // 闪光
      if(animFrame%60<30){
        ctx.fillStyle='rgba(255,215,0,.2)';
        ctx.beginPath();ctx.arc(sx,sy,16,0,Math.PI*2);ctx.fill();
      }
      // E键提示
      if(d<T*2.5){
        ctx.fillStyle='rgba(255,107,53,.8)';ctx.font='9px monospace';ctx.textAlign='center';
        ctx.fillText('[E]开箱',sx,sy-18);
      }
    }
  }

  // 商店
  if(shop){
    const d=Math.hypot(shop.x-player.x,shop.y-player.y);
    if(d<visPx){
      const sx=shop.x-camera.x, sy=shop.y-camera.y;
      // 商人NPC
      ctx.fillStyle='#8e44ad';
      ctx.beginPath();ctx.arc(sx,sy-8,8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#f5c6a0';
      ctx.beginPath();ctx.arc(sx,sy-14,6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#2c3e50';
      ctx.beginPath();ctx.arc(sx,sy-18,5,Math.PI,0);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='9px monospace';ctx.textAlign='center';
      ctx.fillText('🏪',sx,sy+4);
      ctx.fillStyle='#ffd700';ctx.font='8px monospace';
      ctx.fillText('商人',sx,sy+14);
      if(d<T*2.5){
        ctx.fillStyle='rgba(255,215,0,.8)';ctx.font='9px monospace';
        ctx.fillText('[E]购物',sx,sy-24);
      }
    }
  }

  // 小怪
  for(const m of mobs){
    if(!m.alive) continue;
    const d=Math.hypot(m.x-player.x,m.y-player.y);
    if(d>visPx) continue;
    const sx=m.x-camera.x, sy=m.y-camera.y;
    
    // 怪物身体
    ctx.fillStyle=m.color;
    if(m.ai==='static'){
      // 蘑菇
      ctx.beginPath();ctx.arc(sx,sy-2,m.size/2,Math.PI,0);ctx.fill();
      ctx.fillStyle='#1a1a1a';ctx.fillRect(sx-2,sy,4,4);
      // 斑点
      ctx.fillStyle='rgba(255,255,255,.2)';
      ctx.beginPath();ctx.arc(sx-2,sy-4,2,0,Math.PI*2);ctx.fill();
    } else if(m.id==='bat'){
      // 蝙蝠翅膀
      const wingFlap=Math.sin(animFrame*.2)*4;
      ctx.beginPath();ctx.arc(sx,sy,m.size/2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=m.color;
      ctx.beginPath();
      ctx.ellipse(sx-8,sy-2,6,3+wingFlap,.3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();
      ctx.ellipse(sx+8,sy-2,6,3-wingFlap,-.3,0,Math.PI*2);ctx.fill();
      // 红眼
      ctx.fillStyle='#e74c3c';
      ctx.beginPath();ctx.arc(sx-2,sy-2,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sx+2,sy-2,1.5,0,Math.PI*2);ctx.fill();
    } else if(m.id==='ghost'){
      // 幽魂 - 透明
      ctx.globalAlpha=.5+Math.sin(animFrame*.05)*.2;
      ctx.beginPath();ctx.arc(sx,sy-2,m.size/2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(sx-2,sy-3,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sx+2,sy-3,1.5,0,Math.PI*2);ctx.fill();
      // 飘带
      ctx.fillStyle=m.color;
      ctx.fillRect(sx-4,sy+4,8,4+Math.sin(animFrame*.1)*2);
      ctx.globalAlpha=1;
    } else {
      // 通用
      ctx.beginPath();ctx.arc(sx,sy,m.size/2,0,Math.PI*2);ctx.fill();
      // 眼睛
      ctx.fillStyle='#e74c3c';
      ctx.beginPath();ctx.arc(sx-2,sy-1,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sx+2,sy-1,1.5,0,Math.PI*2);ctx.fill();
    }
    
    // 血条
    if(m.curHp<m.maxHp){
      const bw=m.size+4;
      ctx.fillStyle='#333';ctx.fillRect(sx-bw/2,sy-m.size/2-6,bw,3);
      ctx.fillStyle='#e74c3c';ctx.fillRect(sx-bw/2,sy-m.size/2-6,bw*(m.curHp/m.maxHp),3);
    }
  }

  // Boss
  for(const b of bosses){
    if(!b.alive) continue;
    const d=Math.hypot(b.x-player.x,b.y-player.y);
    if(d>visPx+T) continue;
    const sx=b.x-camera.x, sy=b.y-camera.y;
    const alpha=d<=visPx?1:.3;
    ctx.globalAlpha=alpha;

    // Boss光环
    if(b.skillActive){
      ctx.strokeStyle=b.id==='lion'?'#e67e22':'#9b59b6';
      ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(sx,sy,b.size/2+8+Math.sin(animFrame*.1)*3,0,Math.PI*2);ctx.stroke();
    }

    // Boss身体
    const bodyGrad=ctx.createRadialGradient(sx-4,sy-4,0,sx,sy,b.size/2);
    bodyGrad.addColorStop(0,b.color);
    bodyGrad.addColorStop(1,'rgba(0,0,0,.3)');
    ctx.fillStyle=bodyGrad;
    ctx.beginPath();ctx.arc(sx,sy,b.size/2,0,Math.PI*2);ctx.fill();

    // Boss纹理
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;
    for(let i=0;i<3;i++){
      const a=animFrame*.01+i*Math.PI*2/3;
      ctx.beginPath();ctx.arc(sx,sy,b.size/2-4+i*2,a,a+1);ctx.stroke();
    }

    // Boss眼睛
    const eyeAng=Math.atan2(player.y-b.y,player.x-b.x);
    ctx.fillStyle='#ff3333';
    ctx.beginPath();ctx.arc(sx+Math.cos(eyeAng-.3)*6,sy+Math.sin(eyeAng-.3)*6-4,3.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+Math.cos(eyeAng+.3)*6,sy+Math.sin(eyeAng+.3)*6-4,3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(sx+Math.cos(eyeAng-.3)*7,sy+Math.sin(eyeAng-.3)*7-4,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+Math.cos(eyeAng+.3)*7,sy+Math.sin(eyeAng+.3)*7-4,1.5,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='#ff6b35';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText(b.name+(b.skillActive?' ⚡':''),sx,sy-b.size/2-8);

    if(b.poisoned){
      ctx.fillStyle='rgba(46,204,113,.4)';
      ctx.beginPath();ctx.arc(sx,sy,b.size/2+3,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  // 弹道
  for(const p of projectiles){
    const sx=p.x-camera.x, sy=p.y-camera.y;
    ctx.fillStyle=p.color||'#ff6b35';
    ctx.beginPath();ctx.arc(sx,sy,4,0,Math.PI*2);ctx.fill();
    // 弹道拖尾
    ctx.fillStyle=(p.color||'#ff6b35')+'66';
    ctx.beginPath();ctx.arc(sx-p.vx*2,sy-p.vy*2,3,0,Math.PI*2);ctx.fill();
  }

  // 玩家
  drawPlayer();

  // 粒子
  for(const p of particles){
    const sx=p.x-camera.x, sy=p.y-camera.y;
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.fillRect(sx-p.size/2,sy-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;

  // 伤害数字
  for(const d of dmgNums){
    const sx=d.x-camera.x, sy=d.y-camera.y;
    ctx.globalAlpha=d.life/d.maxLife;
    ctx.fillStyle=d.color;
    ctx.font=typeof d.val==='number'?'bold 14px monospace':'bold 12px monospace';
    ctx.textAlign='center';
    ctx.fillText(typeof d.val==='number'?'-'+d.val:d.val,sx,sy);
  }
  ctx.globalAlpha=1;

  // 迷雾渐变
  const fogGrad=ctx.createRadialGradient(W/2,H/2,visPx*.6,W/2,H/2,visPx*1.2);
  fogGrad.addColorStop(0,'rgba(10,5,16,0)');
  fogGrad.addColorStop(1,'rgba(10,5,16,1)');
  ctx.fillStyle=fogGrad;
  ctx.fillRect(0,0,W,H);

  // 受伤闪红
  if(player.hurtCD>200){ctx.fillStyle='rgba(231,76,60,.12)';ctx.fillRect(0,0,W,H)}
  // 混乱
  if(player.effects.some(e=>e.eff==='confuse')){
    ctx.fillStyle='rgba(155,89,182,.06)';ctx.fillRect(0,0,W,H);
    // 扭曲感 - 移动小横线
    ctx.strokeStyle='rgba(155,89,182,.1)';ctx.lineWidth=1;
    for(let i=0;i<5;i++){
      const y=rand(0,H);
      ctx.beginPath();ctx.moveTo(rand(0,W/2),y);ctx.lineTo(rand(W/2,W),y);ctx.stroke();
    }
  }
  // 中毒
  if(player.effects.some(e=>e.eff==='poison')){
    if(animFrame%20<10){ctx.fillStyle='rgba(46,204,113,.04)';ctx.fillRect(0,0,W,H)}
    if(animFrame%60===0) player.hp=Math.max(0,player.hp-5);
    if(player.hp<=0) playerDie('中毒身亡');
  }

  // 攻击弧线
  if(player.attackCD>180){
    ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=3;
    const ax=W/2+Math.cos(player.facing)*22;
    const ay=H/2+Math.sin(player.facing)*22;
    ctx.beginPath();ctx.arc(ax,ay,18,player.facing-.6,player.facing+.6);ctx.stroke();
  }

  // 连击显示
  if(comboCount>=2){
    ctx.fillStyle='rgba(255,107,53,.8)';ctx.font='bold 16px monospace';ctx.textAlign='center';
    ctx.fillText(`${comboCount} COMBO!`,W/2,H-50);
  }

  // 提示文字
  if(tipTimer>0){
    ctx.globalAlpha=Math.min(1,tipTimer/500);
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='11px monospace';ctx.textAlign='center';
    ctx.fillText(tipText,W/2,H-30);
    ctx.globalAlpha=1;
  }

  // 闪避CD指示
  if(player.dashCD>0){
    const pct=1-player.dashCD/2500;
    ctx.fillStyle='rgba(0,188,212,.15)';
    ctx.fillRect(W/2-30,H-18,60*pct,4);
  }

  // 小地图
  renderMinimap();
}

function drawPlayer(){
  const sx=player.x-camera.x, sy=player.y-camera.y;
  
  // 闪避时半透明
  if(player.dashTimer>0){
    ctx.globalAlpha=.4;
    // 残影
    ctx.fillStyle=player.charIdx===0?'rgba(52,152,219,.3)':'rgba(231,76,60,.3)';
    ctx.beginPath();ctx.arc(sx-Math.cos(player.facing)*8,sy-Math.sin(player.facing)*8,10,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  
  drawCharacter(ctx,sx,sy,player.charIdx,player.facing,player.walkAnim,!!player.weapon,player.weapon,player.armor);
  
  // 玩家名字
  ctx.fillStyle='rgba(255,255,255,.6)';ctx.font='8px monospace';ctx.textAlign='center';
  ctx.fillText(player.name,sx,sy-28+Math.sin(player.walkAnim*Math.PI/2)*1.5);
}

function renderMinimap(){
  if(isMobile) return;
  const mw=110, mh=110;
  mmCtx.fillStyle='#0a0510';
  mmCtx.fillRect(0,0,mw,mh);
  if(!map) return;
  const scale=Math.min(mw/map.w,mh/map.h);
  const ox=(mw-map.w*scale)/2, oy=(mh-map.h*scale)/2;

  for(let r=0;r<map.h;r++){
    for(let c=0;c<map.w;c++){
      if(!explored[r][c]) continue;
      mmCtx.fillStyle=map.grid[r][c]===1?'#3a2a4a':'#1a1020';
      mmCtx.fillRect(ox+c*scale,oy+r*scale,Math.max(1,scale),Math.max(1,scale));
    }
  }

  mmCtx.fillStyle='#3498db';
  mmCtx.fillRect(ox+player.x/T*scale-2,oy+player.y/T*scale-2,4,4);

  for(const b of bosses){
    if(!b.alive) continue;
    if(Math.hypot(b.x-player.x,b.y-player.y)>getVis()*T*2) continue;
    mmCtx.fillStyle='#e74c3c';
    mmCtx.fillRect(ox+b.x/T*scale-1,oy+b.y/T*scale-1,3,3);
  }
  for(const m of mobs){
    if(!m.alive) continue;
    if(Math.hypot(m.x-player.x,m.y-player.y)>getVis()*T*2) continue;
    mmCtx.fillStyle='#ff6b35';
    mmCtx.fillRect(ox+m.x/T*scale,oy+m.y/T*scale,2,2);
  }
  for(const p of portals){
    if(p.isExit){mmCtx.fillStyle='#ffd700';mmCtx.fillRect(ox+p.x/T*scale-2,oy+p.y/T*scale-2,4,4)}
  }
}

// ============ HUD ============
function updateHUD(){
  const pct=Math.max(0,player.hp/player.maxHp*100);
  document.getElementById('hpFill').style.width=pct+'%';
  document.getElementById('hpText').textContent=Math.ceil(player.hp)+'/'+player.maxHp;
  document.getElementById('goldTag').textContent='💰'+player.gold;
  document.getElementById('wpnTag').textContent=player.weapon?player.weapon.icon+player.weapon.name:'👊拳头';
  document.getElementById('lvlName').textContent=LEVELS[curLevel].name+' · '+Math.ceil(gameTime)+'s';

  let tags='';
  for(const e of player.effects){
    const cls=e.eff==='slow'?'slow':e.eff==='poison'?'poison':e.eff==='confuse'?'confuse':e.eff==='orb'?'orb':e.eff==='adrenaline'?'adrenaline':e.eff==='torch'?'torch':e.eff==='magnet'?'torch':'';
    const names={slow:'减速',poison:'中毒',confuse:'混乱',orb:'宝珠',adrenaline:'兴奋',torch:'火把',magnet:'磁铁'};
    if(cls) tags+=`<span class="stag ${cls}">${names[e.eff]||e.eff}</span>`;
  }
  if(player.armor) tags+=`<span class="stag armor">🛡${player.armor.wear}</span>`;
  if(player.dashCD<=0) tags+=`<span class="stag dash">💨闪避</span>`;
  document.getElementById('statusTags').innerHTML=tags;

  let inv='';
  for(let i=0;i<5;i++){
    const item=player.inventory[i];
    if(item){inv+=`<div class="inv-s" onclick="useItem(${i})"><span class="key">${i+1}</span>${item.icon}${item.dur?`<span class="cnt">${item.dur}</span>`:''}</div>`}
    else{inv+=`<div class="inv-s"><span class="key">${i+1}</span></div>`}
  }
  document.getElementById('invBar').innerHTML=inv;

  let nearBoss=null;
  for(const b of bosses){if(b.alive&&Math.hypot(b.x-player.x,b.y-player.y)<T*8){nearBoss=b;break}}
  const bossBar=document.getElementById('bossBar');
  if(nearBoss){
    bossBar.style.display='block';
    document.getElementById('bossName').textContent=nearBoss.name+(nearBoss.skillActive?' ⚡':'');
    document.getElementById('bossHpFill').style.width=Math.max(0,nearBoss.curHp/nearBoss.maxHp*100)+'%';
  } else {bossBar.style.display='none'}
}

// ============ 手机控件 ============
function initJoystick(){
  const area=document.getElementById('joyArea');
  const knob=document.getElementById('joyKnob');
  const base=document.getElementById('joyBase');
  let touchId=null;
  const maxR=32;

  area.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];touchId=t.identifier;updateJoy(t)});
  area.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===touchId)updateJoy(t)}});
  area.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===touchId){touchId=null;joyActive=false;joyDir={x:0,y:0};knob.style.left='29px';knob.style.top='29px'}}});

  function updateJoy(t){
    const rect=base.getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    let dx=t.clientX-cx, dy=t.clientY-cy;
    const d=Math.hypot(dx,dy);
    if(d>maxR){dx=dx/d*maxR;dy=dy/d*maxR}
    knob.style.left=(29+dx)+'px';knob.style.top=(29+dy)+'px';
    joyActive=true;joyDir={x:dx/maxR,y:dy/maxR};
  }
}

function mobAttack(){doAttack()}
function mobDash(){doDash()}
function mobInteract(){doInteract()}
function mobUse(){if(player.inventory.length>0)useItem(0)}
function mobTeleport(){doTeleport()}

function victory(){
  document.getElementById('endTitle').textContent='🎉 逃出生天!';
  document.getElementById('endTitle').style.color='#2ecc71';
  document.getElementById('endDesc').textContent='张小龙和徐凝柔成功逃离了山洞!';
  document.getElementById('endStats').innerHTML=`击杀:${stats.kills} | 开箱:${stats.chests} | 金币:${stats.gold} | 闪避:${stats.dashCount}`;
  document.getElementById('endScreen').style.display='flex';
}

function restartGame(){
  document.getElementById('endScreen').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('invBar').style.display='none';
  document.getElementById('titleScreen').classList.add('active');
  player=null;state='title';
}
