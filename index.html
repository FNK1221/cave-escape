<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>山洞逃生 - 张小龙与徐凝柔</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; color:#fff; font-family:'Microsoft YaHei',sans-serif; overflow:hidden; }
  #gameCanvas { display:block; width:100vw; height:100vh; }

  /* 标题屏 */
  #titleScreen {
    position:fixed; inset:0; background:radial-gradient(ellipse at center, #0d0d1a, #000);
    display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200;
  }
  #titleScreen h1 { font-size:28px; color:#ffd700; text-align:center; margin-bottom:8px; line-height:1.4; text-shadow:0 0 20px rgba(255,200,0,0.5); }
  #titleScreen .sub { font-size:14px; color:#888; margin-bottom:36px; text-align:center; }
  .charSelect { display:flex; gap:20px; margin-bottom:32px; }
  .charCard {
    background:rgba(255,255,255,0.05); border:2px solid transparent; border-radius:16px;
    padding:20px; text-align:center; cursor:pointer; transition:all 0.2s; width:140px;
  }
  .charCard.selected { border-color:#ffd700; background:rgba(255,215,0,0.08); }
  .charCard .portrait { width:72px; height:72px; border-radius:50%; margin:0 auto 12px; display:flex; align-items:center; justify-content:center; font-size:38px; }
  .charCard .cname { font-size:15px; color:#ffd700; font-weight:bold; }
  .charCard .cstats { font-size:11px; color:#888; margin-top:6px; line-height:1.6; }
  .startBtn {
    padding:14px 48px; border:none; border-radius:30px; cursor:pointer;
    background:linear-gradient(135deg,#cc6600,#ffd700); color:#000;
    font-size:17px; font-weight:bold; box-shadow:0 4px 20px rgba(255,200,0,0.4); transition:transform 0.1s; margin-bottom:16px;
  }
  .startBtn:active { transform:scale(0.96); }
  .diffRow { display:flex; gap:12px; }
  .diffBtn {
    padding:8px 20px; border-radius:20px; border:1px solid #555; background:transparent; color:#aaa; cursor:pointer; font-size:13px; transition:all 0.2s;
  }
  .diffBtn.active { border-color:#ffd700; color:#ffd700; background:rgba(255,215,0,0.1); }

  /* 关卡过渡 */
  #levelScreen {
    position:fixed; inset:0; background:rgba(0,0,0,0.95);
    display:none; flex-direction:column; align-items:center; justify-content:center; z-index:250;
  }
  #levelScreen .num { font-size:60px; font-weight:bold; color:#ffd700; text-shadow:0 0 30px #ffa000; }
  #levelScreen .name { font-size:24px; color:#fff; margin-top:8px; }
  #levelScreen .desc { font-size:14px; color:#888; margin-top:12px; max-width:280px; text-align:center; }

  /* 游戏结束 */
  #endScreen {
    position:fixed; inset:0; background:rgba(0,0,0,0.92);
    display:none; flex-direction:column; align-items:center; justify-content:center; z-index:300;
  }
  #endTitle { font-size:36px; font-weight:bold; margin-bottom:12px; }
  #endDesc { font-size:15px; color:#888; margin-bottom:40px; }
  #endStats { background:rgba(255,255,255,0.05); border-radius:12px; padding:16px 28px; margin-bottom:32px; text-align:center; line-height:2; }
  #retryBtn {
    padding:12px 40px; border:none; border-radius:24px;
    background:linear-gradient(135deg,#cc3300,#ff6633); color:#fff;
    font-size:16px; cursor:pointer; box-shadow:0 4px 16px rgba(200,50,0,0.4);
  }

  /* HUD */
  #hud { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; }
  #topBar {
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 12px; background:linear-gradient(to bottom,rgba(0,0,0,0.85),transparent);
    font-size:12px;
  }
  .hpBar { width:100px; height:10px; background:#333; border-radius:5px; overflow:hidden; }
  .hpFill { height:100%; background:linear-gradient(to right,#ff4444,#ff8844); border-radius:5px; width:100%; transition:width 0.3s; }
  .mpBar { width:100px; height:6px; background:#333; border-radius:3px; overflow:hidden; margin-top:3px; }
  .mpFill { height:100%; background:linear-gradient(to right,#4488ff,#44ccff); border-radius:3px; width:100%; transition:width 0.3s; }

  #crosshair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
  #crosshair::before { content:''; position:absolute; width:16px; height:2px; background:rgba(255,255,255,0.7); top:50%; left:50%; transform:translate(-50%,-50%); }
  #crosshair::after { content:''; position:absolute; width:2px; height:16px; background:rgba(255,255,255,0.7); top:50%; left:50%; transform:translate(-50%,-50%); }

  #statusEffects { position:fixed; top:60px; left:8px; display:flex; gap:4px; flex-wrap:wrap; }
  .stTag { padding:2px 6px; border-radius:10px; font-size:10px; font-weight:bold; animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  #inventoryHUD { position:fixed; bottom:80px; left:8px; display:flex; flex-direction:column; gap:3px; pointer-events:none; }
  .invSlot { display:flex; align-items:center; gap:4px; background:rgba(0,0,0,0.7); border:1px solid #555; border-radius:4px; padding:3px 6px; font-size:11px; min-width:110px; pointer-events:all; cursor:pointer; }
  .invSlot.active { border-color:#ffd700; }

  /* 小地图 */
  #minimapWrap { position:fixed; bottom:80px; right:8px; pointer-events:none; }
  #minimap { width:100px; height:100px; background:rgba(0,0,0,0.7); border:1px solid rgba(255,215,0,0.3); border-radius:4px; }

  /* 武器 */
  #weaponLayer { position:fixed; bottom:0; right:0; width:200px; height:200px; pointer-events:none; }

  /* 特效层 */
  #hitFlash { position:fixed; inset:0; background:rgba(255,0,0,0.3); pointer-events:none; opacity:0; transition:opacity 0.2s; }
  #healFlash { position:fixed; inset:0; background:rgba(0,255,80,0.15); pointer-events:none; opacity:0; transition:opacity 0.3s; }
  #confuseFx { position:fixed; inset:0; pointer-events:none; opacity:0; background:rgba(150,0,255,0.08); }

  /* Boss血条 */
  #bossHP { position:fixed; top:58px; left:50%; transform:translateX(-50%); width:55vw; max-width:350px; display:none; }
  #bossHP .name { text-align:center; font-size:12px; color:#ff8888; margin-bottom:3px; }
  #bossHP .track { height:10px; background:#333; border-radius:5px; overflow:hidden; border:1px solid #ff4444; }
  #bossHP .fill { height:100%; background:linear-gradient(to right,#ff0000,#ff6600); border-radius:5px; transition:width 0.3s; }

  /* 提示 */
  #hint { position:fixed; bottom:180px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); border:1px solid #ffd700; border-radius:8px; padding:6px 12px; font-size:13px; color:#ffd700; display:none; }

  /* 消息 */
  #msgArea { position:fixed; top:40%; left:50%; transform:translate(-50%,-50%); pointer-events:none; text-align:center; }
  .msgItem { font-size:18px; font-weight:bold; color:#ffd700; text-shadow:0 0 8px #ffa000; animation:msgUp 2s forwards; white-space:nowrap; margin-bottom:4px; }
  @keyframes msgUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-40px)} }

  /* 弹窗 */
  .modal { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:100; }
  .modalBox { background:linear-gradient(160deg,#1a1a2e,#16213e); border:1px solid rgba(255,215,0,0.4); border-radius:16px; padding:20px; width:85vw; max-width:360px; }
  .modalTitle { font-size:17px; color:#ffd700; text-align:center; margin-bottom:12px; }
  .itemGrid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:12px; }
  .itemCard { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:10px; text-align:center; cursor:pointer; }
  .itemCard:hover { border-color:#ffd700; }
  .itemCard .icon { font-size:28px; }
  .itemCard .iname { font-size:12px; color:#ffd700; margin-top:3px; }
  .itemCard .idesc { font-size:10px; color:#aaa; margin-top:2px; }
  .closeBtn { display:block; width:100%; padding:8px; border:none; border-radius:6px; background:rgba(255,255,255,0.1); color:#fff; font-size:13px; cursor:pointer; }

  .teleGrid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:12px; }
  .teleBtn { padding:10px; background:rgba(0,80,200,0.2); border:1px solid rgba(0,120,255,0.4); border-radius:8px; font-size:13px; color:#88bbff; cursor:pointer; text-align:center; }

  /* 手机控制 */
  #touchControls { position:fixed; bottom:0; left:0; right:0; height:140px; display:flex; justify-content:space-between; align-items:flex-end; padding:0 16px 16px; pointer-events:none; }
  #joyArea { width:110px; height:110px; border-radius:50%; background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.2); position:relative; pointer-events:all; touch-action:none; }
  #joyThumb { width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.3); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
  .actBtns { display:flex; flex-direction:column; gap:8px; align-items:flex-end; pointer-events:all; }
  .actBtn { width:50px; height:50px; border-radius:50%; border:none; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; touch-action:none; box-shadow:0 3px 8px rgba(0,0,0,0.5); color:#fff; }
  #btnAtk { background:linear-gradient(135deg,#cc3300,#ff6633); }
  #btnUse { background:linear-gradient(135deg,#006633,#00cc66); }
  #btnTele { background:linear-gradient(135deg,#003399,#0066ff); }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud" style="display:none">
  <div id="topBar">
    <div>
      <div style="font-size:14px;font-weight:bold;color:#ffd700;margin-bottom:3px;" id="charName">张小龙</div>
      <div class="hpBar"><div class="hpFill" id="hpFill"></div></div>
      <div style="font-size:10px;color:#aaa;margin-top:1px;">HP <span id="hpText">100/100</span></div>
    </div>
    <div style="text-align:center;">
      <div style="font-size:16px;font-weight:bold;color:#ffd700;" id="levelTitle">第一关</div>
      <div style="font-size:12px;color:#ff8888;" id="timerText">剩余 30:00</div>
    </div>
    <div style="text-align:right;">
      <div style="color:#ffd700;font-size:11px;">击杀</div>
      <div style="font-size:18px;font-weight:bold;" id="killCount">0</div>
    </div>
  </div>
  <div id="crosshair"></div>
  <div id="statusEffects"></div>
  <div id="inventoryHUD"></div>
  <div id="minimapWrap"><canvas id="minimap" width="100" height="100"></canvas></div>
  <canvas id="weaponLayer" width="200" height="200"></canvas>
  <div id="hitFlash"></div>
  <div id="healFlash"></div>
  <div id="confuseFx"></div>
  <div id="bossHP"><div class="name" id="bossName"></div><div class="track"><div class="fill" id="bossFill"></div></div></div>
  <div id="hint"></div>
  <div id="msgArea"></div>
</div>

<!-- 弹窗 -->
<div id="chestModal" class="modal"><div class="modalBox"><div class="modalTitle">🎁 发现宝箱</div><div class="itemGrid" id="chestGrid"></div><button class="closeBtn" onclick="closeChest()">关闭</button></div></div>
<div id="teleModal" class="modal"><div class="modalBox"><div class="modalTitle">✦ 传送阵</div><div class="teleGrid" id="teleGrid"></div><button class="closeBtn" onclick="closeTele()">取消</button></div></div>

<!-- 手机控制 -->
<div id="touchControls" style="display:none">
  <div id="joyArea"><div id="joyThumb"></div></div>
  <div class="actBtns">
    <button class="actBtn" id="btnAtk">⚔</button>
    <button class="actBtn" id="btnUse">💊</button>
    <button class="actBtn" id="btnTele">✦</button>
  </div>
</div>

<!-- 标题屏 -->
<div id="titleScreen">
  <h1>山洞逃生<br>张小龙 · 徐凝柔</h1>
  <div class="sub">被追杀者逃入山洞，穿越迷宫，逃出生天</div>
  <div class="charSelect">
    <div class="charCard selected" id="cardZhang" onclick="selChar('zhang')">
      <div class="portrait" style="background:linear-gradient(135deg,#8b4513,#cd853f)">🧑</div>
      <div class="cname">张小龙</div>
      <div class="cstats">HP: 120<br>攻击: 高<br>速度: 中</div>
    </div>
    <div class="charCard" id="cardXu" onclick="selChar('xu')">
      <div class="portrait" style="background:linear-gradient(135deg,#4a4a8a,#7a7acf)">👩</div>
      <div class="cname">徐凝柔</div>
      <div class="cstats">HP: 90<br>攻击: 中<br>速度: 高<br>视野: +1格</div>
    </div>
  </div>
  <button class="startBtn" onclick="startGame()">开始逃生</button>
  <div class="diffRow">
    <button class="diffBtn active" id="diffNorm" onclick="setDiff('normal')">普通（入口出发）</button>
    <button class="diffBtn" id="diffHard" onclick="setDiff('hard')">高难（随机出生）</button>
  </div>
</div>

<!-- 关卡过渡 -->
<div id="levelScreen">
  <div class="num" id="levelNum">第 I 关</div>
  <div class="name" id="levelName">幽暗石窟</div>
  <div class="desc" id="levelDesc">追杀者在山洞外等待</div>
</div>

<!-- 结束 -->
<div id="endScreen">
  <div id="endTitle">💀 全灭</div>
  <div id="endDesc">张小龙与徐凝柔未能逃出山洞</div>
  <div id="endStats"></div>
  <button id="retryBtn" onclick="retryGame()">重新逃生</button>
</div>

<script>
// ============================================================
// 配置
// ============================================================
const CFG = {
  CELL: 1, FOV: Math.PI/2.8, RAYS: 220, MAX_D: 16,
  MOVE_SPEED: 0.06, ROT_SPEED: 0.04,
  LEVELS: [
    { name:'幽暗石窟', size:30, time:1800, fog:5, bosses:1, wcol:[60,40,30], fcol:[22,16,10], ccol:[12,8,6], dark:0.78 },
    { name:'腐化地道', size:36, time:1500, fog:4.5, bosses:1, wcol:[30,55,30], fcol:[10,22,10], ccol:[6,12,6], dark:0.84 },
    { name:'熔岩深渊', size:42, time:1200, fog:4, bosses:2, wcol:[75,25,8], fcol:[28,10,4], ccol:[15,5,2], dark:0.88 },
    { name:'幻觉迷宫', size:48, time:1000, fog:3.5, bosses:2, wcol:[55,8,85], fcol:[18,4,28], ccol:[8,2,14], dark:0.9 },
    { name:'BOSS终地', size:50, time:900, fog:4, bosses:1, wcol:[85,8,8], fcol:[30,4,4], ccol:[18,3,3], dark:0.82 },
  ],
  ITEMS: [
    { id:'orb',    icon:'💎', name:'发光宝珠', desc:'视野+3格 45秒', r:2, type:'orb' },
    { id:'adren',  icon:'💉', name:'肾上腺素', desc:'移速+80% 20秒', r:2, type:'adren' },
    { id:'armor',  icon:'🛡', name:'盔甲', desc:'减伤50% 耐久80', r:1, type:'equip' },
    { id:'sword',  icon:'⚔', name:'铁剑', desc:'攻击+25 耐久50', r:2, type:'equip' },
    { id:'bow',    icon:'🏹', name:'石弓', desc:'攻击+18 12箭', r:2, type:'equip' },
    { id:'dagger', icon:'🗡', name:'毒匕首', desc:'攻击+12+毒 耐久30', r:1, type:'equip' },
    { id:'herb',   icon:'🌿', name:'草药包', desc:'回复40HP', r:3, type:'heal40' },
    { id:'antidote',icon:'🧪',name:'解毒药', desc:'解毒', r:2, type:'antidote' },
    { id:'map',    icon:'🗺', name:'地图残页', desc:'揭示大范围', r:1, type:'map' },
    { id:'smoke',  icon:'💨', name:'烟雾弹', desc:'Boss迷失10秒', r:1, type:'smoke' },
    { id:'shield', icon:'🔮', name:'护盾石', desc:'吸收下次伤害', r:1, type:'shield' },
    { id:'awaken', icon:'🧿', name:'清醒药', desc:'解除混乱', r:2, type:'awaken' },
    { id:'rope',   icon:'🪢', name:'钩爪', desc:'跨越障碍 5次', r:1, type:'rope' },
    { id:'torch',  icon:'🔦', name:'火把', desc:'视野+2格 60秒', r:2, type:'torch' },
    { id:'bandage',icon:'🩹', name:'绷带', desc:'回复20HP', r:3, type:'heal20' },
    { id:'elixir', icon:'⚗',  name:'不死药', desc:'一次免死', r:0, type:'revive' },
  ],
  BOSSES: [
    { id:'stone', name:'石傀儡', hp:180, atk:15, speed:0.01, skill:'slow', sname:'震地波', icon:'🗿', wcol:[180,160,140], weak:'sword', wmul:2.2 },
    { id:'spider',name:'毒雾蛛后', hp:140, atk:10, speed:0.015, skill:'poison', sname:'毒雾散布', icon:'🕷', wcol:[100,180,80], weak:'antidote', wmul:2.0 },
    { id:'lion',  name:'幻影狂狮', hp:160, atk:30, speed:0.022, skill:'fury', sname:'狂暴爪击', icon:'🦁', wcol:[240,180,60], weak:'armor', wmul:1.8 },
    { id:'shaman',name:'混沌蛊师', hp:150, atk:18, speed:0.012, skill:'confuse', sname:'幻术咒', icon:'🧿', wcol:[180,60,240], weak:'awaken', wmul:2.5 },
    { id:'lord',  name:'深渊领主', hp:300, atk:25, speed:0.018, skill:'berserk', sname:'三阶段狂暴', icon:'👹', wcol:[220,60,60], weak:'smoke', wmul:2.0 },
  ],
};

let G = null;

// ============================================================
// 迷宫生成
// ============================================================
function genMaze(W, H) {
  const mW = W * 2 + 1, mH = H * 2 + 1;
  const grid = new Array(mH).fill(0).map(() => new Uint8Array(mW).fill(1));
  const vis = new Array(H).fill(0).map(() => new Uint8Array(W).fill(0));
  function carve(cx, cy) {
    vis[cy][cx] = 1;
    grid[cy * 2 + 1][cx * 2 + 1] = 0;
    const dirs = [[0,-1],[0,1],[-1,0],[1,0]].sort(() => Math.random() - 0.5);
    for (const [dx, dy] of dirs) {
      const nx = cx + dx, ny = cy + dy;
      if (nx >= 0 && nx < W && ny >= 0 && ny < H && !vis[ny][nx]) {
        grid[cy * 2 + 1 + dy][cx * 2 + 1 + dx] = 0;
        carve(nx, ny);
      }
    }
  }
  carve(0, 0);
  let extra = Math.floor(W * H * 0.1);
  while (extra-- > 0) {
    const r = Math.floor(Math.random() * (mH - 2)) + 1;
    const c = Math.floor(Math.random() * (mW - 2)) + 1;
    if (grid[r][c] === 1) grid[r][c] = 0;
  }
  return { grid, mW, mH };
}

// ============================================================
// 初始化关卡
// ============================================================
function initLevel(idx) {
  const lvl = CFG.LEVELS[idx];
  const { grid, mW, mH } = genMaze(lvl.size, lvl.size);
  const fogMap = new Array(mH).fill(0).map(() => new Uint8Array(mW).fill(0));

  let px, py;
  if (G.diff === 'hard') {
    do { px = Math.floor(Math.random() * (mW - 2)) + 1; py = Math.floor(Math.random() * (mH - 2)) + 1; }
    while (grid[py][px] !== 0);
  } else {
    px = 1; py = 1;
  }

  // 出口
  let ex, ey;
  let attempts = 0;
  do {
    ex = Math.floor(Math.random() * (mW - 2)) + 1;
    ey = Math.floor(Math.random() * (mH - 2)) + 1;
  } while ((grid[ey][ex] !== 0 || Math.abs(ex - px) < 12 || Math.abs(ey - py) < 12) && ++attempts < 1000);
  if (attempts >= 1000) { ex = mW - 2; ey = mH - 2; }
  grid[ey][ex] = 2;

  // 宝箱
  const chests = [];
  const chestCount = Math.floor(mW * mH * 0.002) + 6;
  for (let i = 0; i < chestCount; i++) {
    let cx, cy, a = 0;
    do { cx = Math.floor(Math.random() * (mW - 2)) + 1; cy = Math.floor(Math.random() * (mH - 2)) + 1; }
    while (grid[cy][cx] !== 0 && ++a < 200);
    if (a < 200) chests.push({ x: cx + 0.5, y: cy + 0.5, opened: false });
  }

  // Boss
  const bosses = [];
  const portals = [];
  const pool = [...CFG.BOSSES].sort(() => Math.random() - 0.5).slice(0, lvl.bosses);
  for (const bd of pool) {
    let bx, by, a = 0;
    do { bx = Math.floor(Math.random() * (mW - 4)) + 2; by = Math.floor(Math.random() * (mH - 4)) + 2; }
    while ((grid[by][bx] !== 0 || Math.sqrt((bx - px) ** 2 + (by - py) ** 2) < 10) && ++a < 200);
    if (a < 200) {
      const boss = { ...bd, x: bx + 0.5, y: by + 0.5, maxHp: bd.hp, hp: bd.hp, homeX: bx + 0.5, homeY: by + 0.5,
        state: 'idle', skillTimer: 0, dead: false, phase: 1, smoked: 0 };
      bosses.push(boss);
      portals.push({ x: bx + 0.5, y: by + 0.5, active: false, bossId: bd.id });
    }
  }

  G.map = grid; G.mapW = mW; G.mapH = mH;
  G.fog = fogMap;
  G.lvl = lvl; G.lvlIdx = idx;
  G.p.x = px + 0.5; G.p.y = py + 0.5;
  G.p.angle = Math.random() * Math.PI * 2;
  G.exit = { x: ex, y: ey };
  G.chests = chests; G.bosses = bosses; G.portals = portals;
  G.inv = [];
  G.effects = { slow:0, poison:0, confuse:0, orb:0, adren:0, torch:0, shield:0, revive:0 };
  G.timer = lvl.time;
  G.nearChest = null; G.nearBoss = null; G.nearPortal = null;
  G.weaponSwing = 0;

  revealFog(px + 0.5, py + 0.5, lvl.fog * 2);
  updateHUD();
}

function revealFog(x, y, r) {
  const rx = Math.floor(x), ry = Math.floor(y);
  const rr = Math.ceil(r);
  for (let dy = -rr; dy <= rr; dy++) {
    for (let dx = -rr; dx <= rr; dx++) {
      const nx = rx + dx, ny = ry + dy;
      if (nx >= 0 && nx < G.mapW && ny >= 0 && ny < G.mapH && dx * dx + dy * dy <= r * r) G.fog[ny][nx] = 1;
    }
  }
}

// ============================================================
// Raycasting 渲染器
// ============================================================
const cv = document.getElementById('gameCanvas');
const cx = cv.getContext('2d');
let CW, CH;

function resize() { CW = cv.width = window.innerWidth; CH = cv.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

function drawRaycast() {
  const p = G.p, lvl = G.lvl;
  const fogDist = (p.effects.orb > 0 ? lvl.fog + 3 : p.effects.torch > 0 ? lvl.fog + 2 : lvl.fog) * 2;
  const halfH = CH / 2;
  const img = cx.createImageData(CW, CH);
  const d = img.data;

  // 预填充天花板和地板
  for (let y = 0; y < CH; y++) {
    const isFloor = y >= halfH;
    const shade = isFloor ? (1 - (y - halfH) / halfH) * 0.4 + 0.05 : ((halfH - y) / halfH) * 0.3 + 0.05;
    const br = isFloor ? lvl.fcol : lvl.ccol;
    for (let x = 0; x < CW; x++) {
      const i = (y * CW + x) * 4;
      d[i] = br[0] * shade; d[i + 1] = br[1] * shade; d[i + 2] = br[2] * shade; d[i + 3] = 255;
    }
  }

  // 墙壁
  for (let x = 0; x < CW; x += 2) {
    const ra = p.angle - CFG.FOV / 2 + (x / CW) * CFG.FOV;
    const sinA = Math.sin(ra), cosA = Math.cos(ra);
    let rx = p.x, ry = p.y;
    let hit = false, dist = 0;

    for (let step = 0; step < CFG.MAX_D * 40; step++) {
      rx += cosA * 0.05; ry += sinA * 0.05;
      const mx = Math.floor(rx), my = Math.floor(ry);
      if (mx < 0 || mx >= G.mapW || my < 0 || my >= G.mapH) { dist = CFG.MAX_D; break; }
      if (G.map[my][mx] === 1) { hit = true; dist = Math.sqrt((rx - p.x) ** 2 + (ry - p.y) ** 2); break; }
    }
    if (!hit) dist = CFG.MAX_D;

    const corrD = dist * Math.cos(ra - p.angle);
    const wallH = Math.min(CH, (1 / corrD) * CH * 0.8);
    const top = Math.floor(halfH - wallH / 2);
    const bot = Math.ceil(halfH + wallH / 2);
    const fogF = Math.min(1, Math.max(0.08, 1 - dist / fogDist));
    const bright = fogF * (1 - lvl.dark) + 0.08;
    const wc = lvl.wcol;
    const wr = Math.floor(wc[0] * bright), wg = Math.floor(wc[1] * bright), wb = Math.floor(wc[2] * bright);

    for (let y = Math.max(0, top); y < Math.min(CH, bot); y++) {
      for (let dx = 0; dx < 2; dx++) {
        if (x + dx >= CW) break;
        const i = (y * CW + x + dx) * 4;
        d[i] = wr; d[i + 1] = wg; d[i + 2] = wb; d[i + 3] = 255;
      }
    }
  }
  cx.putImageData(img, 0, 0);
  drawSprites();
}

function drawSprites() {
  const p = G.p;
  const sprites = [];
  G.chests.filter(c => !c.opened).forEach(c => sprites.push({ x: c.x, y: c.y, type: 'chest' }));
  G.portals.filter(pt => pt.active).forEach(pt => sprites.push({ x: pt.x, y: pt.y, type: 'portal' }));
  G.bosses.filter(e => !e.dead).forEach(e => sprites.push({ x: e.x, y: e.y, type: 'boss', data: e }));
  sprites.push({ x: G.exit.x + 0.5, y: G.exit.y + 0.5, type: 'exit' });

  sprites.sort((a, b) => dist(b.x, b.y, p.x, p.y) - dist(a.x, a.y, p.x, p.y));

  for (const sp of sprites) {
    const dx = sp.x - p.x, dy = sp.y - p.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d > 15) continue;
    const angle = Math.atan2(dy, dx);
    let rel = angle - p.angle;
    while (rel < -Math.PI) rel += Math.PI * 2;
    while (rel > Math.PI) rel -= Math.PI * 2;
    if (Math.abs(rel) > CFG.FOV / 2 * 1.3) continue;

    const sx = (rel / CFG.FOV + 0.5) * CW;
    const sh = Math.min(CH, (1 / d) * CH * 0.5);
    const sy = CH / 2 - sh / 2;
    const fogDist = (p.effects.orb > 0 ? G.lvl.fog + 3 : p.effects.torch > 0 ? G.lvl.fog + 2 : G.lvl.fog) * 2;
    const alpha = Math.min(1, Math.max(0.2, 1 - d / fogDist));

    cx.save();
    cx.globalAlpha = alpha;
    cx.font = `bold ${sh * 0.7}px sans-serif`;
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    if (sp.type === 'chest') {
      cx.fillText('📦', sx, sy + sh * 0.5);
    } else if (sp.type === 'boss') {
      const e = sp.data;
      cx.fillText(e.icon, sx, sy + sh * 0.5);
      cx.fillStyle = 'rgba(0,0,0,0.5)';
      cx.fillRect(sx - sh * 0.3, sy - 6, sh * 0.6, 4);
      cx.fillStyle = `rgb(${Math.floor(255 * (1 - e.hp / e.maxHp))},${Math.floor(200 * e.hp / e.maxHp)},0)`;
      cx.fillRect(sx - sh * 0.3, sy - 6, sh * 0.6 * (e.hp / e.maxHp), 4);
    } else if (sp.type === 'portal') {
      cx.fillText('🌀', sx, sy + sh * 0.5);
    } else if (sp.type === 'exit') {
      cx.fillText('🚪', sx, sy + sh * 0.5);
    }
    cx.restore();
  }
}

const mmCv = document.getElementById('minimap');
const mmCx = mmCv.getContext('2d');

function drawMinimap() {
  if (!G || !G.map.length) return;
  mmCx.fillStyle = '#0a0a0a';
  mmCx.fillRect(0, 0, 100, 100);
  const cs = 100 / G.mapW;
  for (let y = 0; y < G.mapH; y++) {
    for (let x = 0; x < G.mapW; x++) {
      if (!G.fog[y][x]) continue;
      if (G.map[y][x] === 1) { mmCx.fillStyle = 'rgba(100,80,60,0.8)'; mmCx.fillRect(x * cs, y * cs, cs + 0.5, cs + 0.5); }
      else if (G.map[y][x] === 2) { mmCx.fillStyle = '#00cc66'; mmCx.fillRect(x * cs, y * cs, cs + 0.5, cs + 0.5); }
    }
  }
  G.chests.filter(c => !c.opened).forEach(c => { mmCx.fillStyle = '#ffd700'; mmCx.fillRect(c.x * cs - 1, c.y * cs - 1, 3, 3); });
  G.bosses.filter(e => !e.dead).forEach(e => { mmCx.fillStyle = '#ff4444'; mmCx.fillRect(e.x * cs - 1.5, e.y * cs - 1.5, 4, 4); });
  mmCx.fillStyle = '#00ccff';
  mmCx.beginPath(); mmCx.arc(G.p.x * cs, G.p.y * cs, 2.5, 0, Math.PI * 2); mmCx.fill();
  mmCx.strokeStyle = '#00ccff'; mmCx.lineWidth = 1;
  mmCx.beginPath(); mmCx.moveTo(G.p.x * cs, G.p.y * cs);
  mmCx.lineTo((G.p.x + Math.cos(G.p.angle) * 4) * cs, (G.p.y + Math.sin(G.p.angle) * 4) * cs);
  mmCx.stroke();
}

}

// ============================================================
// 玩家更新
// ============================================================
let joyDX = 0, joyDY = 0;

function updatePlayer(dt) {
  const p = G.p, confused = p.effects.confuse > 0, dir = confused ? -1 : 1;
  const speed = p.effects.adren > 0 ? CFG.MOVE_SPEED * 1.8 : p.effects.slow > 0 ? CFG.MOVE_SPEED * 0.45 : CFG.MOVE_SPEED;

  // 键盘
  let mx = 0, my = 0;
  if (keys['KeyW'] || keys['ArrowUp'] || joyDY < -0.2) { my = 1; }
  if (keys['KeyS'] || keys['ArrowDown'] || joyDY > 0.2) { my = -1; }
  if (keys['KeyA'] || keys['ArrowLeft'] || joyDX < -0.2) { p.angle -= CFG.ROT_SPEED * dir * dt * 60; }
  if (keys['KeyD'] || keys['ArrowRight'] || joyDX > 0.2) { p.angle += CFG.ROT_SPEED * dir * dt * 60; }

  // 摇杆前进
  const jLen = Math.sqrt(joyDX ** 2 + joyDY ** 2);
  if (jLen > 0.2) {
    const jAngle = Math.atan2(joyDY, joyDX);
    mx = Math.cos(jAngle); my = Math.sin(jAngle);
  } else if (my !== 0) {
    mx = Math.cos(p.angle) * my; my = Math.sin(p.angle) * my;
  }

  if (mx !== 0 || my !== 0) {
    const nx = p.x + mx * speed * dt * 60, ny = p.y + my * speed * dt * 60;
    if (G.map[Math.floor(p.y)][Math.floor(nx)] !== 1) p.x = nx;
    if (G.map[Math.floor(ny)][Math.floor(p.x)] !== 1) p.y = ny;
  }

  // 迷雾
  const fogR = p.effects.orb > 0 ? G.lvl.fog + 3 : p.effects.torch > 0 ? G.lvl.fog + 2 : G.lvl.fog;
  revealFog(p.x, p.y, fogR * 1.5);

  // 效果衰减
  ['slow','poison','confuse','orb','adren','torch'].forEach(k => { if (p.effects[k] > 0) p.effects[k] -= dt; });
  if (p.effects.poison > 0 && Math.random() < dt * 2) takeDmg(3, '毒伤');

  document.getElementById('confuseFx').style.opacity = p.effects.confuse > 0 ? '0.6' : '0';

  checkNear();
  updateStatus();
}

function checkNear() {
  const p = G.p;
  G.nearChest = G.nearBoss = G.nearPortal = null;

  G.chests.forEach(c => { if (!c.opened && dist(c.x, c.y, p.x, p.y) < 1.2) G.nearChest = c; });
  G.portals.forEach(pt => { if (pt.active && dist(pt.x, pt.y, p.x, p.y) < 1.2) G.nearPortal = pt; });

  let nearD = 4;
  G.bosses.forEach(e => {
    if (!e.dead) {
      const d = dist(e.x, e.y, p.x, p.y);
      if (d < nearD) { nearD = d; G.nearBoss = e; }
    }
  });

  if (G.exit && dist(G.exit.x + 0.5, G.exit.y + 0.5, p.x, p.y) < 1.2) { nextLevel(); return; }

  const hint = document.getElementById('hint');
  if (G.nearChest) { hint.style.display = 'block'; hint.textContent = '📦 按 E / 点击打开'; }
  else if (G.nearPortal) { hint.style.display = 'block'; hint.textContent = '✦ 按 F / 点击传送'; }
  else { hint.style.display = 'none'; }

  if (G.nearBoss) showBossHP(G.nearBoss);
  else document.getElementById('bossHP').style.display = 'none';
}

// ============================================================
// Boss AI
// ============================================================
function updateBosses(dt) {
  const p = G.p;
  G.bosses.forEach(b => {
    if (b.dead) return;
    const d = dist(b.x, b.y, p.x, p.y);
    const hd = dist(b.x, b.y, b.homeX, b.homeY);

    // 深渊领主三阶段
    if (b.id === 'lord') {
      const pct = b.hp / b.maxHp;
      b.phase = pct > 0.66 ? 1 : pct > 0.33 ? 2 : 3;
      b.atk = 25 * (b.phase === 2 ? 1.5 : b.phase === 3 ? 2.2 : 1);
      b.speed = 0.018 * (b.phase === 2 ? 1.3 : b.phase === 3 ? 1.6 : 1);
    }

    // 超出范围返回
    if (hd > 12 && d > 5) {
      const ba = Math.atan2(b.homeY - b.y, b.homeX - b.x);
      b.x += Math.cos(ba) * b.speed * dt * 60;
      b.y += Math.sin(ba) * b.speed * dt * 60;
      return;
    }

    // 追击
    if (d < 8) {
      const angle = Math.atan2(p.y - b.y, p.x - b.x);
      b.x += Math.cos(angle) * b.speed * dt * 60;
      b.y += Math.sin(angle) * b.speed * dt * 60;

      if (d < 0.8) {
        if (!b._cd || b._cd <= 0) {
          b._cd = 100;
          let dmg = b.atk;
          if (b.smoked > 0) { dmg = 0; b.smoked -= dt; }
          if (p.effects.shield) { p.effects.shield = 0; showMsg('🔮 护盾挡下了伤害！'); }
          else takeDmg(dmg, b.name);
        }
      }
      if (b._cd > 0) b._cd -= dt * 60;

      // 技能
      b.skillTimer -= dt * 60;
      if (b.skillTimer <= 0 && d < 6) {
        useBossSkill(b);
        b.skillTimer = 250;
      }
    }
  });
}

function useBossSkill(b) {
  const p = G.p;
  showMsg(`${b.icon} ${b.sname}！`);
  switch (b.skill) {
    case 'slow': p.effects.slow = 8; showMsg('🔵 被减速！'); break;
    case 'poison': p.effects.poison = 15; showMsg('☠ 中毒了！'); break;
    case 'fury': takeDmg(b.atk * 1.5, '狂暴爪击'); break;
    case 'confuse': p.effects.confuse = 6; showMsg('🌀 混乱！方向反了！'); break;
    case 'berserk': if (b.phase === 3) takeDmg(b.atk, '终极冲撞'); break;
  }
}

// ============================================================
// 战斗
// ============================================================
let atkCD = 0;

function doAttack() {
  if (!G || !G.running || atkCD > 0) return;
  atkCD = 0.5;
  const p = G.p;
  let atk = p.atk;
  if (p.weapon) { atk += p.weapon.atk; p.weapon.durability--; if (p.weapon.durability <= 0) { showMsg(`⚠ ${p.weapon.name} 损坏了！`); p.weapon = null; } }

  // 武器挥动动画
  waCv.style.transform = 'rotate(-15deg) scale(1.1)';
  setTimeout(() => waCv.style.transform = '', 200);

  let hit = null, hd = 99;
  G.bosses.forEach(e => {
    if (e.dead) return;
    const d = dist(e.x, e.y, p.x, p.y);
    if (d < 2.5) {
      const a = Math.atan2(e.y - p.y, e.x - p.x);
      let rel = a - p.angle;
      while (rel < -Math.PI) rel += Math.PI * 2; while (rel > Math.PI) rel -= Math.PI * 2;
      if (Math.abs(rel) < 1 && d < hd) { hit = e; hd = d; }
    }
  });

  if (hit) {
    let mul = 1;
    if (p.weapon && p.weapon.id === hit.weak) { mul = hit.wmul; showMsg('💥 弱点命中！'); }
    const dmg = Math.floor(atk * mul * (0.8 + Math.random() * 0.4));
    hit.hp -= dmg;
    showMsg(`⚔ 对 ${hit.name} 造成 ${dmg} 伤害`);
    if (hit.hp <= 0) {
      hit.dead = true; hit.hp = 0;
      p.kills++; document.getElementById('killCount').textContent = p.kills;
      showMsg(`💀 ${hit.name} 被击败！`);
      const pt = G.portals.find(x => x.bossId === hit.id);
      if (pt) { pt.active = true; showMsg('🌀 传送阵已激活！'); }
      document.getElementById('bossHP').style.display = 'none';
    } else {
      showBossHP(hit);
    }
  }
}

function showBossHP(b) {
  document.getElementById('bossHP').style.display = 'block';
  const phaseStr = b.id === 'lord' ? `(${b.phase}阶段)` : '';
  document.getElementById('bossName').textContent = `${b.icon} ${b.name} ${phaseStr} — ${b.skill === 'slow' ? '减速型' : b.skill === 'poison' ? '中毒型' : b.skill === 'fury' ? '高伤型' : b.skill === 'confuse' ? '混乱型' : '终极型'}`;
  document.getElementById('bossFill').style.width = (b.hp / b.maxHp * 100) + '%';
}

// 道具系统
// ============================================================
function interact() { if (G.nearChest) openChest(G.nearChest); }

function openChest(chest) {
  chest.opened = true; G.nearChest = null;
  const pool = [];
  CFG.ITEMS.forEach(it => { for (let i = 0; i < (it.r + 1) * 2; i++) pool.push(it); });
  const item = pool[Math.floor(Math.random() * pool.length)];

  const grid = document.getElementById('chestGrid');
  grid.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'itemCard';
  card.innerHTML = `<div class="icon">${item.icon}</div><div class="iname">${item.name}</div><div class="idesc">${item.desc}</div>`;
  card.onclick = () => { pickupItem(item); closeChest(); };
  grid.appendChild(card);
  document.getElementById('chestModal').style.display = 'flex';
}

function closeChest() { document.getElementById('chestModal').style.display = 'none'; }

function pickupItem(it) {
  if (G.inv.length >= 5) { showMsg('⚠ 背包已满！'); return; }
  const item = { ...it };
  if (item.id === 'armor') item.durability = 80;
  if (item.id === 'sword') { item.durability = 50; item.atk = 25; }
  if (item.id === 'bow') { item.durability = 12; item.atk = 18; }
  if (item.id === 'dagger') { item.durability = 30; item.atk = 12; }
  G.inv.push(item);
  showMsg(`✅ 获得 ${item.icon} ${item.name}`);
  updateHUD();
}

function useItem(idx) {
  if (idx >= G.inv.length) return;
  const it = G.inv[idx], p = G.p;
  switch (it.type) {
    case 'orb': p.effects.orb = 45; showMsg('💎 视野大增！'); break;
    case 'adren': p.effects.adren = 20; showMsg('💉 肾上腺素！'); break;
    case 'equip':
      if (it.id === 'armor') { p.armor = it; showMsg('🛡 穿上盔甲'); }
      else { p.weapon = it; showMsg(`${it.icon} 装备 ${it.name}`); }
      break;
    case 'heal40': heal(40); break;
    case 'heal20': heal(20); break;
    case 'antidote': p.effects.poison = 0; showMsg('🧪 解毒！'); break;
    case 'map': revealFog(p.x, p.y, 18); showMsg('🗺 地图展开！'); break;
    case 'smoke': G.bosses.forEach(e => { if (dist(e.x, e.y, p.x, p.y) < 8) e.smoked = 10; }); showMsg('💨 烟雾弥漫！'); break;
    case 'shield': p.effects.shield = 1; showMsg('🔮 护盾激活！'); break;
    case 'awaken': p.effects.confuse = 0; showMsg('🧿 清醒！'); break;
    case 'torch': p.effects.torch = 60; showMsg('🔦 火把点亮！'); break;
    case 'revive': p.effects.revive = 1; showMsg('⚗ 不死药生效！'); break;
  }
  if (!['equip'].includes(it.type)) G.inv.splice(idx, 1);
  updateHUD();
}

function heal(amt) {
  G.p.hp = Math.min(G.p.maxHp, G.p.hp + amt);
  document.getElementById('healFlash').style.opacity = '1';
  setTimeout(() => document.getElementById('healFlash').style.opacity = '0', 400);
  showMsg(`💚 回复 ${amt} HP`);
  updateHUD();
}

function takeDmg(amount, src) {
  const p = G.p;
  let dmg = amount;
  if (p.armor) { dmg = Math.floor(dmg * 0.5); p.armor.durability -= 15; if (p.armor.durability <= 0) { showMsg('⚠ 盔甲碎裂！'); p.armor = null; } }
  p.hp = Math.max(0, p.hp - dmg);
  document.getElementById('hitFlash').style.opacity = '1';
  setTimeout(() => document.getElementById('hitFlash').style.opacity = '0', 300);
  showMsg(`💔 受到 ${dmg} 伤害（${src}）`);
  updateHUD();
  if (p.hp <= 0) {
    if (p.effects.revive) { p.hp = 30; p.effects.revive = 0; showMsg('⚗ 不死药救了一命！'); updateHUD(); return; }
    endGame(false);
  }
}

function doTeleport() {
  if (!G.nearPortal) return;
  const dirs = [['⬆ 北', 0, -1], ['⬇ 南', 0, 1], ['⬅ 西', -1, 0], ['➡ 东', 1, 0]];
  const grid = document.getElementById('teleGrid');
  grid.innerHTML = '';
  dirs.forEach(([label, dx, dy]) => {
    const btn = document.createElement('div');
    btn.className = 'teleBtn';
    btn.textContent = label;
    btn.onclick = () => { teleMove(dx, dy); closeTele(); };
    grid.appendChild(btn);
  });
  document.getElementById('teleModal').style.display = 'flex';
}

function teleMove(dx, dy) {
  const p = G.p, maxDist = Math.floor(G.mapW * 0.25);
  let tx = Math.floor(p.x), ty = Math.floor(p.y), moved = 0;
  while (moved < maxDist) {
    const nx = tx + dx, ny = ty + dy;
    if (nx < 0 || nx >= G.mapW || ny < 0 || ny >= G.mapH || G.map[ny][nx] === 1) break;
    tx = nx; ty = ny; moved++;
  }
  if (moved > 2) { p.x = tx + 0.5; p.y = ty + 0.5; showMsg(`✦ 传送 ${moved} 格！`); }
  else showMsg('⚠ 该方向无法传送');
}

function closeTele() { document.getElementById('teleModal').style.display = 'none'; }

// ============================================================
// 关卡/游戏流程
// ============================================================
function nextLevel() {
  if (G.lvlIdx >= CFG.LEVELS.length - 1) { endGame(true); return; }
  G.lvlIdx++;
  showLevelScreen(G.lvlIdx, () => { initLevel(G.lvlIdx); });
}

function showLevelScreen(idx, cb) {
  const lvl = CFG.LEVELS[idx];
  document.getElementById('levelNum').textContent = `第 ${['I','II','III','IV','V'][idx]} 关`;
  document.getElementById('levelName').textContent = lvl.name;
  document.getElementById('levelDesc').textContent = lvl.desc;
  document.getElementById('levelTitle').textContent = `${['第一','第二','第三','第四','最终'][idx]}关`;
  document.getElementById('levelScreen').style.display = 'flex';
  setTimeout(() => { document.getElementById('levelScreen').style.display = 'none'; if (cb) cb(); }, 2500);
}

function startTimer() {
  if (G.timerId) clearInterval(G.timerId);
  G.timerId = setInterval(() => {
    if (!G.running) return;
    G.timer--;
    G.totalTime++;
    const m = Math.floor(G.timer / 60), s = G.timer % 60;
    document.getElementById('timerText').textContent = `剩余 ${m}:${String(s).padStart(2, '0')}`;
    if (G.timer <= 0) {
      clearInterval(G.timerId);
      showMsg('⏰ 时间耗尽！追杀者降临！');
      G.bosses.forEach(e => { if (!e.dead) { e.homeX = G.p.x; e.homeY = G.p.y; e.speed *= 1.5; } });
    }
  }, 1000);
}

function endGame(win) {
  G.running = false;
  if (G.timerId) clearInterval(G.timerId);
  document.getElementById('endScreen').style.display = 'flex';
  document.getElementById('endTitle').textContent = win ? '🎉 成功逃生！' : '💀 全灭';
  document.getElementById('endTitle').style.color = win ? '#ffd700' : '#ff4444';
  document.getElementById('endDesc').textContent = win ? '张小龙与徐凝柔逃出了山洞' : '在黑暗中倒下，无法逃脱';
  const m = Math.floor(G.totalTime / 60), s = G.totalTime % 60;
  document.getElementById('endStats').innerHTML = `关卡：第${G.lvlIdx + 1}关<br>存活时间：${m}分${s}秒<br>击杀Boss：${G.p.kills}个`;
}

function retryGame() {
  document.getElementById('endScreen').style.display = 'none';
  document.getElementById('titleScreen').style.display = 'flex';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('touchControls').style.display = 'none';
}

// ============================================================
// UI 更新
// ============================================================
function updateHUD() {
  const p = G.p;
  document.getElementById('hpFill').style.width = (p.hp / p.maxHp * 100) + '%';
  document.getElementById('hpText').textContent = `${p.hp}/${p.maxHp}`;
  const invEl = document.getElementById('inventoryHUD');
  invEl.innerHTML = '';
  G.inv.forEach((it, i) => {
    const div = document.createElement('div');
    div.className = 'invSlot' + (p.weapon === it || p.armor === it ? ' active' : '');
    const dur = it.durability !== undefined ? ` (${it.durability})` : it.ammo !== undefined ? ` x${it.ammo}` : '';
    div.textContent = `${i + 1}. ${it.icon} ${it.name}${dur}`;
    div.onclick = () => useItem(i);
    invEl.appendChild(div);
  });
}

function updateStatus() {
  const p = G.p, el = document.getElementById('statusEffects');
  el.innerHTML = '';
  const add = (cls, text) => { const d = document.createElement('div'); d.className = 'stTag ' + cls; d.textContent = text; el.appendChild(d); };
  if (p.effects.slow > 0) add('stTag', `🔵减速 ${Math.ceil(p.effects.slow)}s`);
  if (p.effects.poison > 0) add('stTag', `☠毒 ${Math.ceil(p.effects.poison)}s`);
  if (p.effects.confuse > 0) add('stTag', `🌀混乱 ${Math.ceil(p.effects.confuse)}s`);
  if (p.effects.orb > 0) add('stTag', `💎宝珠 ${Math.ceil(p.effects.orb)}s`);
  if (p.effects.adren > 0) add('stTag', `💉肾上腺素 ${Math.ceil(p.effects.adren)}s`);
  if (p.effects.torch > 0) add('stTag', `🔦火把 ${Math.ceil(p.effects.torch)}s`);
}

function showMsg(text) {
  const el = document.getElementById('msgArea');
  const d = document.createElement('div');
  d.className = 'msgItem';
  d.textContent = text;
  el.appendChild(d);
  setTimeout(() => d.remove(), 2100);
}

// ============================================================
// 输入
// ============================================================
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyE') interact();
  if (e.code === 'Space' || e.code === 'KeyZ') doAttack();
  if (e.code === 'KeyF') doTeleport();
  if (e.code === 'Digit1') useItem(0);
  if (e.code === 'Digit2') useItem(1);
  if (e.code === 'Digit3') useItem(2);
  if (e.code === 'Digit4') useItem(3);
  if (e.code === 'Digit5') useItem(4);
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// 鼠标
let mouseDown = false, lastMX = 0;
cv.addEventListener('mousedown', e => { mouseDown = true; lastMX = e.clientX; });
cv.addEventListener('mousemove', e => {
  if (mouseDown) { G.p.angle += (e.clientX - lastMX) * 0.004; lastMX = e.clientX; }
});
cv.addEventListener('mouseup', () => mouseDown = false);
cv.addEventListener('click', () => { if (G && G.running) doAttack(); });

// 触摸
const joyArea = document.getElementById('joyArea');
const joyThumb = document.getElementById('joyThumb');
let joyOrigin = null, joyTouchId = null;
const joyMax = 45;

joyArea.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const r = joyArea.getBoundingClientRect();
  joyOrigin = { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  joyTouchId = t.identifier;
}, { passive: false });
joyArea.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joyTouchId) {
      let dx = t.clientX - joyOrigin.x, dy = t.clientY - joyOrigin.y;
      const len = Math.sqrt(dx * dx + dy * dy);
      if (len > joyMax) { dx = dx / len * joyMax; dy = dy / len * joyMax; }
      joyThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      joyDX = dx / joyMax; joyDY = dy / joyMax;
    }
  }
}, { passive: false });
const endJoy = () => { joyDX = 0; joyDY = 0; joyThumb.style.transform = 'translate(-50%,-50%)'; joyOrigin = null; };
joyArea.addEventListener('touchend', endJoy);
joyArea.addEventListener('touchcancel', endJoy);

document.getElementById('btnAtk').addEventListener('touchstart', e => { e.preventDefault(); doAttack(); }, { passive: false });
document.getElementById('btnAtk').addEventListener('click', doAttack);
document.getElementById('btnUse').addEventListener('touchstart', e => { e.preventDefault(); useItem(0); }, { passive: false });
document.getElementById('btnUse').addEventListener('click', () => useItem(0));
document.getElementById('btnTele').addEventListener('touchstart', e => { e.preventDefault(); doTeleport(); }, { passive: false });
document.getElementById('btnTele').addEventListener('click', doTeleport);

// ============================================================
// 游戏启动
// ============================================================
function selChar(c) {
  G.selected = c;
  document.getElementById('cardZhang').classList.toggle('selected', c === 'zhang');
  document.getElementById('cardXu').classList.toggle('selected', c === 'xu');
}
function setDiff(d) {
  G.diff = d;
  document.getElementById('diffNorm').classList.toggle('active', d === 'normal');
  document.getElementById('diffHard').classList.toggle('active', d === 'hard');
}

function startGame() {
  document.getElementById('titleScreen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('touchControls').style.display = 'flex';

  // 初始化玩家
  const isXu = G.selected === 'xu';
  G.p = { x: 0, y: 0, angle: 0, hp: isXu ? 90 : 120, maxHp: isXu ? 90 : 120, mp: 100, maxMp: 100,
    atk: isXu ? 14 : 18, speed: isXu ? CFG.MOVE_SPEED * 1.2 : CFG.MOVE_SPEED, name: isXu ? '徐凝柔' : '张小龙',
    armor: null, weapon: null, kills: 0 };
  document.getElementById('charName').textContent = G.p.name;

  G.lvlIdx = 0; G.running = true; G.totalTime = 0;
  showLevelScreen(0, () => {
    initLevel(0);
    startTimer();
    lastTime = performance.now();
    requestAnimationFrame(loop);
  });
}

// ============================================================
// 主循环
// ============================================================
let lastTime = 0;
function loop(ts) {
  if (!G || !G.running) return;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (atkCD > 0) atkCD -= dt;

  drawRaycast();
  updatePlayer(dt);
  updateBosses(dt);
  drawMinimap();
  drawWeapon();

  requestAnimationFrame(loop);
}

// ============================================================
// 工具
// ============================================================
function dist(ax, ay, bx, by) { return Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2); }

// 初始化全局
G = { selected: 'zhang', diff: 'normal', running: false };

</script>
